<svg xmlns="http://www.w3.org/2000/svg" width="1048" height="918.5" viewBox="0 0 1048 918.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1048" height="918.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1000" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Choose an implementation approach</text><text x="46" y="77" font-size="13.5" fill="#475569">Draft several independent approaches to the same problem, then run a single-elimination bracket of pairwise judges until</text><text x="46" y="96" font-size="13.5" fill="#475569">one approach is left standing.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the design space is wide and quality is easier to judge head-to-head than to score in the abstract — pairwise</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">comparison beats absolute scoring.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1000" height="644.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="176.5" x2="1024" y2="176.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane-empty"><line x1="24" y1="422.5" x2="1024" y2="422.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="523.5" x2="1024" y2="523.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Generate several approaches from different priorities — simplest, most scalable, least risky — each a self-contained design brief.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Draft the contenders</text><text x="80" y="54" font-size="12.5" fill="#475569">Generate several approaches from different</text><text x="80" y="71" font-size="12.5" fill="#475569">priorities — simplest, most scalable, least</text><text x="80" y="88" font-size="12.5" fill="#475569">risky — each a self-contained design brief.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 176.5)"><g class="lane-label"><title>Every match pits two approaches on the same rubric; the judge picks the stronger and names the single deciding factor.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Judge pairwise</text><text x="80" y="54" font-size="12.5" fill="#475569">Every match pits two approaches on the same</text><text x="80" y="71" font-size="12.5" fill="#475569">rubric; the judge picks the stronger and names</text><text x="80" y="88" font-size="12.5" fill="#475569">the single deciding factor.</text><circle cx="84" cy="103" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 422.5)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Advance the bracket</text><text x="80" y="54" font-size="11" fill="#94a3b8" font-style="italic">control only</text></g></g><g transform="translate(0 523.5)"><g class="lane-label"><title>Document the winning approach and graft in the best ideas from the contenders it beat on the way to the final.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Write up the winner</text><text x="80" y="54" font-size="12.5" fill="#475569">Document the winning approach and graft in the</text><text x="80" y="71" font-size="12.5" fill="#475569">best ideas from the contenders it beat on the</text><text x="80" y="88" font-size="12.5" fill="#475569">way to the final.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(431 0)"><g class="edge"><path d="M 304 57 L 82.03 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="82.03,73 88.76,69.01 89.26,75.99" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 230.01 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="230.01,73 236.11,68.1 237.59,74.94" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 377.99 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="377.99,73 370.41,74.94 371.89,68.1" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 525.97 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="525.97,73 518.74,75.99 519.24,69.01" fill="#64748b"/></g><g class="edge"><path d="M 82.03 99 L 82.03 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="82.03,132.5 78.53,125.5 85.53,125.5" fill="#64748b"/></g><g class="edge"><path d="M 230.01 99 L 230.01 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="230.01,132.5 226.51,125.5 233.51,125.5" fill="#64748b"/></g><g class="edge"><path d="M 377.99 99 L 377.99 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="377.99,132.5 374.49,125.5 381.49,125.5" fill="#64748b"/></g><g class="edge"><path d="M 525.97 99 L 525.97 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="525.97,132.5 522.47,125.5 529.47,125.5" fill="#64748b"/></g><g class="edge"><path d="M 304 139.5 L 304 155.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,155.5 300.5,148.5 307.5,148.5" fill="#64748b"/></g><g class="edge"><path d="M 304 238.5 L 304 286.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,286.5 300.5,279.5 307.5,279.5" fill="#64748b"/><text x="309" y="262.5" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 238.5 L 434 336.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,336.5 426.3,335.08 430.52,329.49" fill="#64748b"/><text x="374" y="287.5" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 434 343.5 L 304 363.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,363.5 310.39,358.98 311.45,365.89" fill="#64748b"/></g><g class="edge"><path d="M 304 162.5 L 304 216.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,216.5 300.5,209.5 307.5,209.5" fill="#64748b"/></g><g class="edge"><path d="M 304 389.5 L 304 569.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,569.5 300.5,562.5 307.5,562.5" fill="#64748b"/></g><circle class="hub" cx="304" cy="53.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="82.03" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="82.03" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:simplest</text></g><g class="agent-node"><circle cx="230.01" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="230.01" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:most scalable</text></g><g class="agent-node"><circle cx="377.99" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="377.99" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:least risky</text></g><g class="agent-node"><circle cx="525.97" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="525.97" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:fastest to ship</text></g><rect class="barrier" x="69.03" y="132.5" width="469.94" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="159" r="3.5" fill="#94a3b8"/><g class="decision"><title>!b</title><polygon points="304,216.5 315,227.5 304,238.5 293,227.5" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="231.5" font-size="11" fill="#94a3b8" font-style="italic">!b</text></g><g class="control-node"><title>continue;</title><rect class="control-box" x="243.5" y="286.5" width="121" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="305.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">continue loop</text></g><circle class="hub" cx="434" cy="340" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Pick the stronger approach and say why:\nA: ${a}\nB: ${b}</title><circle cx="304" cy="376.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="380.5" font-size="12.5" fill="#334155">match:${i / 2}</text></g><g class="agent-node"><title>Document the winning approach: ${bracket[0]}</title><circle cx="304" cy="582.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="loop-badge"><title>repeat for i &lt; bracket.length</title><text x="323" y="244.5" font-size="11" fill="#e8694a" font-weight="600">↻ repeat for i &lt; bracket.length</text></g><g class="loop-badge"><title>repeat while bracket.length &gt; 1</title><text x="323" y="258.5" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while bracket.length &gt; 1</text></g></g></g>
