<svg xmlns="http://www.w3.org/2000/svg" width="1089" height="910.5" viewBox="0 0 1089 910.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1089" height="910.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1041" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Choose an implementation approach</text><text x="46" y="77" font-size="13.5" fill="#475569">Draft several independent approaches to the same problem, then run a single-elimination bracket of pairwise judges until one</text><text x="46" y="96" font-size="13.5" fill="#475569">approach is left standing.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the design space is wide and quality is easier to judge head-to-head than to score in the abstract — pairwise</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">comparison beats absolute scoring.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1041" height="636.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="168.5" x2="1065" y2="168.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane-empty"><line x1="24" y1="400.5" x2="1065" y2="400.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="515.5" x2="1065" y2="515.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Generate several approaches from different priorities — simplest, most scalable, least risky — each a self-contained design brief.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Draft the contenders</text><text x="80" y="54" font-size="12.5" fill="#475569">Generate several approaches from different</text><text x="80" y="71" font-size="12.5" fill="#475569">priorities — simplest, most scalable, least</text><text x="80" y="88" font-size="12.5" fill="#475569">risky — each a self-contained design brief.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 168.5)"><g class="lane-label"><title>Every match pits two approaches on the same rubric; the judge picks the stronger and names the single deciding factor.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Judge pairwise</text><text x="80" y="54" font-size="12.5" fill="#475569">Every match pits two approaches on the same</text><text x="80" y="71" font-size="12.5" fill="#475569">rubric; the judge picks the stronger and names</text><text x="80" y="88" font-size="12.5" fill="#475569">the single deciding factor.</text><circle cx="84" cy="103" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 400.5)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Advance the bracket</text><text x="80" y="54" font-size="11" fill="#94a3b8" font-style="italic">control only</text></g></g><g transform="translate(0 515.5)"><g class="lane-label"><title>Document the winning approach and graft in the best ideas from the contenders it beat on the way to the final.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Write up the winner</text><text x="80" y="54" font-size="12.5" fill="#475569">Document the winning approach and graft in the</text><text x="80" y="71" font-size="12.5" fill="#475569">best ideas from the contenders it beat on the</text><text x="80" y="88" font-size="12.5" fill="#475569">way to the final.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(462 0)"><g class="edge"><path d="M 304 57 L 79 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="79,73 85.73,69.01 86.23,75.99" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 229 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="229,73 235.12,68.12 236.58,74.96" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 379 73" fill="none" stroke="#64748b" stroke-wi