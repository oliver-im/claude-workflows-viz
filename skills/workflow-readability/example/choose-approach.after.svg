<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1205.5" viewBox="0 0 760 1205.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="1205.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Choose an implementation approach</text><text x="46" y="77" font-size="13.5" fill="#475569">Draft several independent approaches to the same problem, then run a</text><text x="46" y="96" font-size="13.5" fill="#475569">single-elimination bracket of pairwise judges until one approach is left standing.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the design space is wide and quality is easier to judge head-to-head than</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">to score in the abstract — pairwise comparison beats absolute scoring.</text></g></g>
<g transform="translate(0 204)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Draft the contenders</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Generate several approaches from different priorities — simplest, most scalable,</text><text x="82" y="68" font-size="13" fill="#475569">least risky — each a self-contained design brief.</text></g></g>
<g transform="translate(0 304)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Judge pairwise</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="82" y="50" font-size="13" fill="#475569">Every match pits two approaches on the same rubric; the judge picks the stronger and</text><text x="82" y="68" font-size="13" fill="#475569">names the single deciding factor.</text></g></g>
<g transform="translate(0 404)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Advance the bracket</text><text x="82" y="50" font-size="13" fill="#475569">Winners re-pair each round and losers drop out, repeating until one approach</text><text x="82" y="68" font-size="13" fill="#475569">survives the final match.</text></g></g>
<g transform="translate(0 504)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Write up the winner</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="82" y="50" font-size="13" fill="#475569">Document the winning approach and graft in the best ideas from the contenders it</text><text x="82" y="68" font-size="13" fill="#475569">beat on the way to the final.</text></g></g>
<g class="topology" transform="translate(0 604)"><rect class="swimlane" x="24" y="12" width="712" height="162.5" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="178.5" width="712" height="223" rx="10" fill="#ede9fe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane-empty" x="24" y="443.5" width="712" height="30" rx="10" fill="#eef2f7" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4 3"/><rect class="swimlane" x="24" y="489.5" width="712" height="76" rx="10" fill="#dbeafe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><g class="edge"><path d="M 304 57 L 79 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="79,73 85.73,69.01 86.23,75.99" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 229 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="229,73 235.12,68.12 236.58,74.96" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 379 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="379,73 371.42,74.96 372.88,68.12" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 529 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="529,73 521.77,75.99 522.27,69.01" fill="#64748b"/></g><g class="edge"><path d="M 79 99 L 79 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="79,132.5 75.5,125.5 82.5,125.5" fill="#64748b"/></g><g class="edge"><path d="M 229 99 L 229 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="229,132.5 225.5,125.5 232.5,125.5" fill="#64748b"/></g><g class="edge"><path d="M 379 99 L 379 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="379,132.5 375.5,125.5 382.5,125.5" fill="#64748b"/></g><g class="edge"><path d="M 529 99 L 529 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="529,132.5 525.5,125.5 532.5,125.5" fill="#64748b"/></g><g class="edge"><path d="M 304 139.5 L 304 155.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,155.5 300.5,148.5 307.5,148.5" fill="#64748b"/></g><g class="edge"><path d="M 304 238.5 L 304 286.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,286.5 300.5,279.5 307.5,279.5" fill="#64748b"/><text x="309" y="262.5" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 238.5 L 434 336.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,336.5 426.3,335.08 430.52,329.49" fill="#64748b"/><text x="374" y="287.5" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 434 343.5 L 304 363.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,363.5 310.39,358.98 311.45,365.89" fill="#64748b"/></g><g class="edge"><path d="M 304 162.5 L 304 216.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,216.5 300.5,209.5 307.5,209.5" fill="#64748b"/></g><g class="edge"><path d="M 304 389.5 L 304 527.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,527.5 300.5,520.5 307.5,520.5" fill="#64748b"/></g><circle class="hub" cx="304" cy="53.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="79" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="79" y="111" font-size="11" fill="#334155" text-anchor="middle">Draft the simplest app…</text></g><g class="agent-node"><circle cx="229" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="229" y="111" font-size="11" fill="#334155" text-anchor="middle">Draft the most scalabl…</text></g><g class="agent-node"><circle cx="379" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="379" y="111" font-size="11" fill="#334155" text-anchor="middle">Draft the least risky…</text></g><g class="agent-node"><circle cx="529" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="529" y="111" font-size="11" fill="#334155" text-anchor="middle">Draft the fastest to s…</text></g><rect class="barrier" x="66" y="132.5" width="476" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="159" r="3.5" fill="#94a3b8"/><g class="decision"><title>!opponent</title><polygon points="304,216.5 315,227.5 304,238.5 293,227.5" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="231.5" font-size="11" fill="#94a3b8" font-style="italic">!opponent</text></g><g class="control-node"><title>continue;</title><rect class="control-box" x="243.5" y="286.5" width="121" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="305.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">continue loop</text></g><circle class="hub" cx="434" cy="340" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Pick the stronger approach and say why:\nA: ${a}\nB: ${opponent}</title><circle cx="304" cy="376.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="380.5" font-size="12.5" fill="#334155">Judge this pairing</text></g><g class="agent-node"><title>Document the winning approach: ${bracket[0]}</title><circle cx="304" cy="540.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="544.5" font-size="12.5" fill="#334155">Document the winning approach:…</text></g><g class="loop-badge"><title>repeat for i &lt; bracket.length</title><text x="323" y="244.5" font-size="11" fill="#e8694a" font-weight="600">↻ repeat for i &lt; bracket.length</text></g><g class="loop-badge"><title>repeat while bracket.length &gt; 1</title><text x="323" y="258.5" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while bracket.length &gt; 1</text></g><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Draft the contenders</text><rect x="661" y="27" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="41" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="203.5" r="11" fill="#334155"/><text x="49" y="207.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="207.5" font-size="15" fill="#0f172a" font-weight="700">Judge pairwise</text><rect x="597" y="193.5" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="659.5" y="207.5" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text></g><g class="lane-chrome"><circle cx="49" cy="458.5" r="11" fill="#334155"/><text x="49" y="462.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="463" font-size="14" fill="#0f172a" font-weight="600">Advance the bracket</text><text x="722" y="463" font-size="11" fill="#94a3b8" font-style="italic" text-anchor="end">control only</text></g><g class="lane-chrome"><circle cx="49" cy="514.5" r="11" fill="#334155"/><text x="49" y="518.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="72" y="518.5" font-size="15" fill="#0f172a" font-weight="700">Write up the winner</text><rect x="668" y="504.5" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="695" y="518.5" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g></g>
</svg>
