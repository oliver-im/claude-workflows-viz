<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Summarize an unfamiliar codebase</text><text x="46" y="77" font-size="13.5" fill="#475569">Fan out one reader per top-level module, each summarizing its slice in isolation, then synthesize the slices into a single</text><text x="46" y="96" font-size="13.5" fill="#475569">architecture overview.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — On first contact with a large repo no single context can hold, when each module still fits comfortably on its own for a focused</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">reader.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="458" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="164" x2="1098" y2="164" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="318" x2="1098" y2="318" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">List the modules</text><text x="74" y="48" font-size="12.5" fill="#475569">Walk the top-level directories</text><text x="74" y="65" font-size="12.5" fill="#475569">and package manifests to build</text><text x="74" y="82" font-size="12.5" fill="#475569">the work-list — one reader per</text><text x="74" y="99" font-size="12.5" fill="#475569">module, nothing read in depth</text><text x="74" y="116" font-size="12.5" fill="#475569">yet.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g transform="translate(0 164)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Read every module in par…</text><text x="74" y="48" font-size="12.5" fill="#475569">Each reader summarizes its</text><text x="74" y="65" font-size="12.5" fill="#475569">module&#39;s purpose, public</text><text x="74" y="82" font-size="12.5" fill="#475569">surface, and key dependencies,</text><text x="74" y="99" font-size="12.5" fill="#475569">blind to the others so they</text><text x="74" y="116" font-size="12.5" fill="#475569">all run at once.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 318)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Synthesize the overview</text><text x="74" y="48" font-size="12.5" fill="#475569">Merge the per-module summaries</text><text x="74" y="65" font-size="12.5" fill="#475569">into one architecture doc: a</text><text x="74" y="82" font-size="12.5" fill="#475569">dependency sketch, the real</text><text x="74" y="99" font-size="12.5" fill="#475569">entry points, and where a</text><text x="74" y="116" font-size="12.5" fill="#475569">newcomer should start.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: claude-opus-4-8</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 76 L 304 204" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,204 300.5,197 307.5,197" fill="#64748b"/></g><g class="edge"><path d="M 304 230 L 304 358" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,358 300.5,351 307.5,351" fill="#64748b"/></g><g class="agent-node"><title>List top-level modules with a one-line guess at each one&#39;s job.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="agent-node"><circle cx="306" cy="219" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="217" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="221" font-size="12.5" fill="#334155">read each modules.modules</text><text x="318" y="206" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="agent-node"><title>Write one architecture overview from these module summaries:\n${JSON.stringify(…</title><circle cx="304" cy="371" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
