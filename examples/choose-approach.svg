<svg xmlns="http://www.w3.org/2000/svg" width="760" height="612" viewBox="0 0 760 612" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="612" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Choose an implementation approach</text><text x="46" y="77" font-size="13.5" fill="#475569">Draft several independent approaches to the same problem, then run a</text><text x="46" y="96" font-size="13.5" fill="#475569">single-elimination bracket of pairwise judges until one approach is left standing.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the design space is wide and quality is easier to judge head-to-head than</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">to score in the abstract — pairwise comparison beats absolute scoring.</text></g></g>
<g transform="translate(0 204)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Draft the contenders</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Generate several approaches from different priorities — simplest, most scalable,</text><text x="82" y="68" font-size="13" fill="#475569">least risky — each a self-contained design brief.</text></g></g>
<g transform="translate(0 304)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Judge pairwise</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="82" y="50" font-size="13" fill="#475569">Every match pits two approaches on the same rubric; the judge picks the stronger and</text><text x="82" y="68" font-size="13" fill="#475569">names the single deciding factor.</text></g></g>
<g transform="translate(0 404)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Advance the bracket</text><text x="82" y="50" font-size="13" fill="#475569">Winners re-pair each round and losers drop out, repeating until one approach</text><text x="82" y="68" font-size="13" fill="#475569">survives the final match.</text></g></g>
<g transform="translate(0 504)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Write up the winner</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="82" y="50" font-size="13" fill="#475569">Document the winning approach and graft in the best ideas from the contenders it</text><text x="82" y="68" font-size="13" fill="#475569">beat on the way to the final.</text></g></g>
</svg>
