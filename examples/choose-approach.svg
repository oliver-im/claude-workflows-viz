748b"/></g><g class="edge"><path d="M 304 139.5 L 304 155.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,155.5 300.5,148.5 307.5,148.5" fill="#64748b"/></g><g class="edge"><path d="M 304 162.5 L 304 216.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,216.5 300.5,209.5 307.5,209.5" fill="#64748b"/></g><g class="edge"><path d="M 304 242.5 L 304 380.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,380.5 300.5,373.5 307.5,373.5" fill="#64748b"/></g><circle class="hub" cx="304" cy="53.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="82.03" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="82.03" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:simplest</text></g><g class="agent-node"><circle cx="230.01" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="230.01" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:most scalable</text></g><g class="agent-node"><circle cx="377.99" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="377.99" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:least risky</text></g><g class="agent-node"><circle cx="525.97" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="525.97" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:fastest to ship</text></g><rect class="barrier" x="69.03" y="132.5" width="469.94" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="159" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="304" cy="229.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="233.5" font-size="12.5" fill="#334155">match:${i / 2}</text></g><g class="agent-node"><circle cx="304" cy="393.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="397.5" font-size="12.5" fill="#334155">Document the winning approach:…</text></g><g class="loop-badge"><text x="325" y="248.5" font-size="11" fill="#e8694a" font-weight="600">↻ repeat for i &lt; bracket.length</text></g><g class="loop-badge"><text x="325" y="262.5" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while bracket.length &gt; 1</text></g><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Draft the contenders</text><rect x="661" y="27" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="41" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="203.5" r="11" fill="#334155"/><text x="49" y="207.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="207.5" font-size="15" fill="#0f172a" font-weight="700">Judge pairwise</text><rect x="597" y="193.5" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="659.5" y="207.5" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text></g><g class="lane-chrome"><circle cx="49" cy="311.5" r="11" fill="#334155"/><text x="49" y="315.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="316" font-size="14" fill="#0f172a" font-weight="600">Advance the bracket</text><text x="722" y="316" font-size="11" fill="#94a3b8" font-style="italic" text-anchor="end">control only</text></g><g class="lane-chrome"><circle cx="49" cy="367.5" r="11" fill="#334155"/><text x="49" y="371.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="72" y="371.5" font-size="15" fill="#0f172a" font-weight="700">Write up the winner</text><rect x="668" y="357.5" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="695" y="371.5" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g></g>
