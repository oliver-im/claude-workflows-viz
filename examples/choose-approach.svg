<g transform="translate(0 662)"><g class="phase-card"><rect x="76" y="0" width="660" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="107" cy="29" r="13" fill="#334155"/><text x="107" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="134" y="32" font-size="16" fill="#0f172a" font-weight="700">Advance the bracket</text><text x="134" y="50" font-size="13" fill="#475569">Winners re-pair each round and losers drop out, repeating until one approach</text><text x="134" y="68" font-size="13" fill="#475569">survives the final match.</text></g></g>
