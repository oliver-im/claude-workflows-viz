<g transform="translate(0 24)"><g class="header-card"><rect x="76" y="0" width="660" height="183" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="98" y="48" font-size="22" fill="#0f172a" font-weight="700">Choose an implementation approach</text><text x="98" y="77" font-size="13.5" fill="#475569">Draft several independent approaches to the same problem, then run a</text><text x="98" y="96" font-size="13.5" fill="#475569">single-elimination bracket of pairwise judges until one approach is left</text><text x="98" y="115" font-size="13.5" fill="#475569">standing.</text><text x="98" y="144" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the design space is wide and quality is easier to judge</text><text x="98" y="161" font-size="12.5" fill="#64748b" font-style="italic">head-to-head than to score in the abstract — pairwise comparison beats absolute sco…</text></g></g>
