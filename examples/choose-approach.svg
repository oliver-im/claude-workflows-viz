<g transform="translate(0 462)"><g class="graph-band"><title>Every match pits two approaches on the same rubric; the judge picks the stronger and names the single deciding factor.</title><rect x="76" y="0" width="660" height="155" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="107" cy="29" r="13" fill="#334155"/><text x="107" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="134" y="32" font-size="16" fill="#0f172a" font-weight="700">Judge pairwise</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="94" y="54" font-size="11.5" fill="#64748b">Every match pits two approaches on the same rubric; the judge picks the stronger and names t…</text><path d="M 147.63 96 L 212.26 96" fill="none" stroke="#475569" stroke-width="1.2"/><g class="arrowhead"><polygon points="212.26,96 205.26,99.5 205.26,92.5" fill="#475569"/></g><path d="M 241.26 96 L 384.26 96" fill="none" stroke="#475569" stroke-width="1.2"/><g class="arrowhead"><polygon points="384.26,96 377.26,99.5 377.26,92.5" fill="#475569"/></g><text x="378.26" y="91" font-size="9.5" fill="#94a3b8" text-anchor="end">no</text><g class="agent-node"><circle cx="136.63" cy="96" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="136.63" y="119" font-size="10.5" fill="#334155" text-anchor="middle">match:${i /</text><text x="136.63" y="131" font-size="10.5" fill="#334155" text-anchor="middle">2}</text></g><g class="decision"><polygon points="227.26,82 241.26,96 227.26,110 213.26,96" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="247.26" y="82" font-size="10.5" fill="#334155">i &lt;</text><text x="247.26" y="108" font-size="10.5" fill="#334155">bracket.length</text></g><g class="decision"><polygon points="399.26,82 413.26,96 399.26,110 385.26,96" fill="#fff