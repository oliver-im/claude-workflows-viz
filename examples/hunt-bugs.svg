<svg xmlns="http://www.w3.org/2000/svg" width="760" height="893" viewBox="0 0 760 893" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="893" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Hunt bugs until the search goes dry</text><text x="46" y="77" font-size="13.5" fill="#475569">Repeatedly spawn finders that surface fresh bugs; keep looping while new ones appear</text><text x="46" y="96" font-size="13.5" fill="#475569">and stop only after two rounds in a row turn up nothing new.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For unknown-size discovery, where a fixed pass count either stops early and</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">misses the tail or burns budget long after the well has run dry.</text></g></g>
<g transform="translate(0 204)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Find a round of bugs</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Each round runs finders across the codebase and dedupes their hits against</text><text x="82" y="68" font-size="13" fill="#475569">everything already seen, so only genuinely new bugs count.</text></g></g>
<g transform="translate(0 304)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Verify and bank the survivors</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="82" y="50" font-size="13" fill="#475569">Confirm each fresh bug actually reproduces, drop the false positives, and add what&#39;s</text><text x="82" y="68" font-size="13" fill="#475569">left to the running ledger.</text></g></g>
<g transform="translate(0 404)"><g class="phase-card"><rect x="24" y="0" width="712" height="48" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Stop when the well runs dry</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g></g>
<g class="topology" transform="translate(0 468)"><rect class="swimlane" x="24" y="12" width="712" height="209" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="229" width="712" height="76" rx="10" fill="#ede9fe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="309" width="712" height="80" rx="10" fill="#dbeafe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><g class="edge"><path d="M 304 132 L 304 152" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,152 300.5,145 307.5,145" fill="#64748b"/><text x="309" y="142" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 132 L 434 202" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,202 426.18,201.76 429.5,195.6" fill="#64748b"/><text x="374" y="167" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 110" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,110 300.5,103 307.5,103" fill="#64748b"/></g><g class="edge"><path d="M 434 209 L 304 267" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,267 308.97,260.95 311.82,267.34" fill="#64748b"/></g><g class="edge"><path d="M 304 293 L 304 347" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,347 300.5,340 307.5,340" fill="#64748b"/></g><g class="agent-node"><title>Find bugs in the codebase.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="67" font-size="12.5" fill="#334155">Find bugs in the codebase.</text></g><g class="decision"><title>fresh.length === 0</title><polygon points="304,110 315,121 304,132 293,121" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="125" font-size="11" fill="#94a3b8" font-style="italic">fresh.length === 0</text></g><g class="control-node"><title>continue;</title><rect class="control-box" x="243.5" y="152" width="121" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="171" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">continue loop</text></g><circle class="hub" cx="434" cy="205.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="306" cy="282" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="280" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="284" font-size="12.5" fill="#334155">verify each fresh</text><text x="318" y="269" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="347" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="366" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g><g class="loop-badge"><title>repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remaining() &gt; 50_000)</title><text x="325" y="82" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remai…</text></g><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Find a round of bugs</text><rect x="661" y="27" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="41" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="254" r="11" fill="#334155"/><text x="49" y="257.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="258" font-size="15" fill="#0f172a" font-weight="700">Verify and bank the survivors</text><rect x="597" y="244" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="659.5" y="258" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text></g><g class="lane-chrome"><circle cx="49" cy="334" r="11" fill="#334155"/><text x="49" y="337.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="338" font-size="15" fill="#0f172a" font-weight="700">Stop when the well runs dry</text><rect x="668" y="324" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="695" y="338" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g></g>
</svg>
