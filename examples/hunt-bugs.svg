<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="703" viewBox="0 0 1122 703" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="703" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Hunt bugs until the search goes dry</text><text x="46" y="77" font-size="13.5" fill="#475569">Repeatedly spawn finders that surface fresh bugs; keep looping while new ones appear and stop only after two rounds in a row turn</text><text x="46" y="96" font-size="13.5" fill="#475569">up nothing new.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For unknown-size discovery, where a fixed pass count either stops early and misses the tail or burns budget long after the well</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">has run dry.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="451" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="225" x2="1098" y2="225" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="381" x2="1098" y2="381" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Find a round of bugs</text><text x="74" y="48" font-size="12.5" fill="#475569">Each round runs finders across</text><text x="74" y="65" font-size="12.5" fill="#475569">the codebase and dedupes their</text><text x="74" y="82" font-size="12.5" fill="#475569">hits against everything</text><text x="74" y="99" font-size="12.5" fill="#475569">already seen, so only</text><text x="74" y="116" font-size="12.5" fill="#475569">genuinely new bugs count.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 225)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Verify and bank the surv…</text><text x="74" y="48" font-size="12.5" fill="#475569">Confirm each fresh bug</text><text x="74" y="65" font-size="12.5" fill="#475569">actually reproduces, drop the</text><text x="74" y="82" font-size="12.5" fill="#475569">false positives, and add</text><text x="74" y="99" font-size="12.5" fill="#475569">what&#39;s left to the running</text><text x="74" y="116" font-size="12.5" fill="#475569">ledger.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: claude-opus-4-8</text></g></g><g transform="translate(0 381)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Stop when the well runs…</text><text x="74" y="49" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 132 L 304 152" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,152 300.5,145 307.5,145" fill="#64748b"/><text x="309" y="142" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 132 L 434 202" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,202 426.18,201.76 429.5,195.6" fill="#64748b"/><text x="374" y="167" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 110" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,110 300.5,103 307.5,103" fill="#64748b"/></g><g class="edge"><path d="M 434 209 L 304 267" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,267 308.97,260.95 311.82,267.34" fill="#64748b"/></g><g class="edge"><path d="M 304 293 L 304 421" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,421 300.5,414 307.5,414" fill="#64748b"/></g><g class="agent-node"><title>Find bugs in the codebase.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="decision"><title>fresh.length === 0</title><polygon points="304,110 315,121 304,132 293,121" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="125" font-size="11" fill="#94a3b8" font-style="italic">fresh.length === 0</text></g><g class="control-node"><title>continue;</title><rect class="control-box" x="243.5" y="152" width="121" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="171" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">continue loop</text></g><circle class="hub" cx="434" cy="205.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="306" cy="282" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="280" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="284" font-size="12.5" fill="#334155">verify each fresh</text><text x="318" y="269" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="421" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="440" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g><g class="loop-badge"><title>repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remaining() &gt; 50_000)</title><text x="325" y="82" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remai…</text></g></g></g>
</svg>
