<svg xmlns="http://www.w3.org/2000/svg" width="760" height="484" viewBox="0 0 760 484" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="484" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Hunt bugs until the search goes dry</text><text x="46" y="77" font-size="13.5" fill="#475569">Repeatedly spawn finders that surface fresh bugs; keep looping while new ones appear</text><text x="46" y="96" font-size="13.5" fill="#475569">and stop only after two rounds in a row turn up nothing new.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For unknown-size discovery, where a fixed pass count either stops early and</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">misses the tail or burns budget long after the well has run dry.</text></g></g>
<g class="topology" transform="translate(0 204)"><rect class="swimlane" x="24" y="12" width="712" height="76" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="96" width="712" height="76" rx="10" fill="#ede9fe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane-empty" x="24" y="214" width="712" height="30" rx="10" fill="#eef2f7" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4 3"/><g class="edge"><path d="M 304 76 L 304 134" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,134 300.5,127 307.5,127" fill="#64748b"/></g><g class="agent-node"><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="67" font-size="12.5" fill="#334155">Find bugs in the codebase.</text></g><g class="agent-node"><circle cx="306" cy="149" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="147" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="151" font-size="12.5" fill="#334155">verify:${b.id}</text><text x="318" y="136" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="loop-badge"><text x="325" y="82" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remai…</text></g><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Find a round of bugs</text><rect x="661" y="27" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="41" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="121" r="11" fill="#334155"/><text x="49" y="124.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="125" font-size="15" fill="#0f172a" font-weight="700">Verify and bank the survivors</text><rect x="597" y="111" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="659.5" y="125" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text></g><g class="lane-chrome"><circle cx="49" cy="229" r="11" fill="#334155"/><text x="49" y="232.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="233.5" font-size="14" fill="#0f172a" font-weight="600">Stop when the well runs dry</text><text x="722" y="233.5" font-size="11" fill="#94a3b8" font-style="italic" text-anchor="end">control only</text></g></g>
</svg>
