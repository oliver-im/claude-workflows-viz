<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1058.5" viewBox="0 0 760 1058.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="1058.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Adversarially verify a fix</text><text x="46" y="77" font-size="13.5" fill="#475569">One worker proposes the smallest patch that makes a failing test pass; a panel of</text><text x="46" y="96" font-size="13.5" fill="#475569">skeptics each tries to refute it, and it ships only if they can&#39;t.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For a fix in a high-blast-radius area, where a plausible patch that merely</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">silences the symptom is more dangerous than leaving the bug open.</text></g></g>
<g transform="translate(0 204)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Reproduce the failure</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="82" y="50" font-size="13" fill="#475569">Confirm the bug reproduces from a clean checkout and capture the exact failing</text><text x="82" y="68" font-size="13" fill="#475569">assertion as the ground truth every skeptic must respect.</text></g></g>
<g transform="translate(0 304)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Propose a minimal patch</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Find the root cause and write the smallest patch (ideally &lt; 20 lines) that turns the</text><text x="82" y="68" font-size="13" fill="#475569">test green without weakening the assertion.</text></g></g>
<g transform="translate(0 404)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Refute in parallel</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="82" y="50" font-size="13" fill="#475569">Spawn skeptics on distinct lenses — correctness, security, regressions — each told</text><text x="82" y="68" font-size="13" fill="#475569">to break the patch and to default to rejecting it.</text></g></g>
<g transform="translate(0 504)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Ship or bounce</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Ship only if a majority of skeptics fail to refute; otherwise bounce the patch back</text><text x="82" y="68" font-size="13" fill="#475569">with their strongest counter-example attached.</text></g></g>
<g class="topology" transform="translate(0 604)"><rect class="swimlane" x="24" y="12" width="712" height="76" rx="10" fill="#dbeafe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="92" width="712" height="76" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="172" width="712" height="162.5" rx="10" fill="#ede9fe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="338.5" width="712" height="80" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><g class="edge"><path d="M 304 76 L 304 130" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,130 300.5,123 307.5,123" fill="#64748b"/></g><g class="edge"><path d="M 304 217 L 175.16 233" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,233 181.68,228.66 182.54,235.61" fill="#64748b"/></g><g class="edge"><path d="M 304 217 L 304 233" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,233 300.5,226 307.5,226" fill="#64748b"/></g><g class="edge"><path d="M 304 217 L 432.84 233" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,233 425.46,235.61 426.32,228.66" fill="#64748b"/></g><g class="edge"><path d="M 175.16 259 L 175.16 292.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,292.5 171.66,285.5 178.66,285.5" fill="#64748b"/></g><g class="edge"><path d="M 304 259 L 304 292.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,292.5 300.5,285.5 307.5,285.5" fill="#64748b"/></g><g class="edge"><path d="M 432.84 259 L 432.84 292.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,292.5 429.34,285.5 436.34,285.5" fill="#64748b"/></g><g class="edge"><path d="M 304 299.5 L 304 315.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,315.5 300.5,308.5 307.5,308.5" fill="#64748b"/></g><g class="edge"><path d="M 304 156 L 304 210" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,210 300.5,203 307.5,203" fill="#64748b"/></g><g class="edge"><path d="M 304 322.5 L 304 376.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,376.5 300.5,369.5 307.5,369.5" fill="#64748b"/></g><g class="agent-node"><title>Reproduce the bug from a clean checkout; quote the failing assertion.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="67" font-size="12.5" fill="#334155">Reproduce the bug from a clean checkout…</text></g><g class="agent-node"><title>Write the smallest patch that fixes:\n${failing}</title><circle cx="304" cy="143" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="147" font-size="12.5" fill="#334155">Write the smallest patch that fixes:…</text></g><circle class="hub" cx="304" cy="213.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="246" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="271" font-size="11" fill="#334155" text-anchor="middle">refute:correctness</text></g><g class="agent-node"><circle cx="304" cy="246" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="271" font-size="11" fill="#334155" text-anchor="middle">refute:security</text></g><g class="agent-node"><circle cx="432.84" cy="246" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="271" font-size="11" fill="#334155" text-anchor="middle">refute:regressions</text></g><rect class="barrier" x="162.16" y="292.5" width="283.68" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="319" r="3.5" fill="#94a3b8"/><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="376.5" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="395.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Reproduce the failure</text><rect x="668" y="27" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="695" y="41" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g><g class="lane-chrome"><circle cx="49" cy="117" r="11" fill="#334155"/><text x="49" y="120.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="121" font-size="15" fill="#0f172a" font-weight="700">Propose a minimal patch</text><rect x="661" y="107" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="121" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="197" r="11" fill="#334155"/><text x="49" y="200.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="201" font-size="15" fill="#0f172a" font-weight="700">Refute in parallel</text><rect x="597" y="187" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="659.5" y="201" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text></g><g class="lane-chrome"><circle cx="49" cy="363.5" r="11" fill="#334155"/><text x="49" y="367.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="72" y="367.5" font-size="15" fill="#0f172a" font-weight="700">Ship or bounce</text><rect x="661" y="353.5" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="367.5" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g></g>
</svg>
