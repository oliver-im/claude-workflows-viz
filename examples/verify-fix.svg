<svg xmlns="http://www.w3.org/2000/svg" width="1252" height="782.5" viewBox="0 0 1252 782.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1252" height="782.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1204" height="128" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Adversarially verify a fix</text><text x="46" y="77" font-size="13.5" fill="#475569">One worker proposes the smallest patch that makes a failing test pass; a panel of skeptics each tries to refute it, and it ships only if they can&#39;t.</text><text x="46" y="106" font-size="12.5" fill="#64748b" font-style="italic">When to use — For a fix in a high-blast-radius area, where a plausible patch that merely silences the symptom is more dangerous than leaving the bug open.</text></g></g>
<g transform="translate(0 168)"><rect x="24" y="12" width="1204" height="566.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="156" x2="1228" y2="156" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="285" x2="1228" y2="285" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="451.5" x2="1228" y2="451.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Confirm the bug reproduces from a clean checkout and capture the exact failing assertion as the ground truth every skeptic must respect.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Reproduce the failure</text><text x="80" y="54" font-size="12.5" fill="#475569">Confirm the bug reproduces from a clean</text><text x="80" y="71" font-size="12.5" fill="#475569">checkout and capture the exact failing</text><text x="80" y="88" font-size="12.5" fill="#475569">assertion as the ground truth every skeptic</text><text x="80" y="105" font-size="12.5" fill="#475569">must respect.</text><circle cx="84" cy="120" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 156)"><g class="lane-label"><title>Find the root cause and write the smallest patch (ideally &lt; 20 lines) that turns the test green without weakening the assertion.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Propose a minimal patch</text><text x="80" y="54" font-size="12.5" fill="#475569">Find the root cause and write the smallest</text><text x="80" y="71" font-size="12.5" fill="#475569">patch (ideally &lt; 20 lines) that turns the test</text><text x="80" y="88" font-size="12.5" fill="#475569">green without weakening the assertion.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 285)"><g class="lane-label"><title>Spawn skeptics on distinct lenses — correctness, security, regressions — each told to break the patch and to default to rejecting it.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Refute in parallel</text><text x="80" y="54" font-size="12.5" fill="#475569">Spawn skeptics on distinct lenses —</text><text x="80" y="71" font-size="12.5" fill="#475569">correctness, security, regressions — each told</text><text x="80" y="88" font-size="12.5" fill="#475569">to break the patch and to default to rejecting</text><text x="80" y="105" font-size="12.5" fill="#475569">it.</text><circle cx="84" cy="120" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 451.5)"><g class="lane-label"><title>Ship only if a majority of skeptics fail to refute; otherwise bounce the patch back with their strongest counter-example attached.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Ship or bounce</text><text x="80" y="54" font-size="12.5" fill="#475569">Ship only if a majority of skeptics fail to</text><text x="80" y="71" font-size="12.5" fill="#475569">refute; otherwise bounce the patch back with</text><text x="80" y="88" font-size="12.5" fill="#475569">their strongest counter-example attached.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(468 0)"><g class="edge"><path d="M 304 76 L 304 196" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,196 300.5,189 307.5,189" fill="#64748b"/></g><g class="edge"><path d="M 304 332 L 175.16 348" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,348 181.68,343.66 182.54,350.61" fill="#64748b"/></g><g class="edge"><path d="M 304 332 L 304 348" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,348 300.5,341 307.5,341" fill="#64748b"/></g><g class="edge"><path d="M 304 332 L 432.84 348" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,348 425.46,350.61 426.32,343.66" fill="#64748b"/></g><g class="edge"><path d="M 175.16 374 L 175.16 407.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,407.5 171.66,400.5 178.66,400.5" fill="#64748b"/></g><g class="edge"><path d="M 304 374 L 304 407.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,407.5 300.5,400.5 307.5,400.5" fill="#64748b"/></g><g class="edge"><path d="M 432.84 374 L 432.84 407.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,407.5 429.34,400.5 436.34,400.5" fill="#64748b"/></g><g class="edge"><path d="M 304 414.5 L 304 430.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,430.5 300.5,423.5 307.5,423.5" fill="#64748b"/></g><g class="edge"><path d="M 304 222 L 304 325" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,325 300.5,318 307.5,318" fill="#64748b"/></g><g class="edge"><path d="M 304 437.5 L 304 491.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,491.5 300.5,484.5 307.5,484.5" fill="#64748b"/></g><g class="agent-node"><title>Reproduce the bug from a clean checkout; quote the failing assertion.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="agent-node"><title>Write the smallest patch that fixes:\n${failing}</title><circle cx="304" cy="209" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="328.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="361" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="386" font-size="11" fill="#334155" text-anchor="middle">refute:correctness</text></g><g class="agent-node"><circle cx="304" cy="361" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="386" font-size="11" fill="#334155" text-anchor="middle">refute:security</text></g><g class="agent-node"><circle cx="432.84" cy="361" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="386" font-size="11" fill="#334155" text-anchor="middle">refute:regressions</text></g><rect class="barrier" x="162.16" y="407.5" width="283.68" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="434" r="3.5" fill="#94a3b8"/><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="491.5" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="510.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
</svg>
