="edge"><path d="M 304 156 L 304 210" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,210 300.5,203 307.5,203" fill="#64748b"/></g><g class="agent-node"><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="67" font-size="12.5" fill="#334155">Reproduce the bug from a clean checkout…</text></g><g class="agent-node"><circle cx="304" cy="143" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="147" font-size="12.5" fill="#334155">Write the smallest patch that fixes:…</text></g><circle class="hub" cx="304" cy="213.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="246" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="271" font-size="11" fill="#334155" text-anchor="middle">refute:correctness</text></g><g class="agent-node"><circle cx="304" cy="246" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="271" font-size="11" fill="#334155" text-anchor="middle">refute:security</text></g><g class="agent-node"><circle cx="432.84" cy="246" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="271" font-size="11" fill="#334155" text-anchor="middle">refute:regressions</text></g><rect class="barrier" x="162.16" y="292.5" width="283.68" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="319" r="3.5" fill="#94a3b8"/><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Reproduce the failure</text><rect x="668" y="27" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="695" y="41" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g><g class="lane-chrome"><circle cx="49" cy="117" r="11" fill="#334155"/><text x="49" y="120.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="121" font-size="15" fill="#0f172a" font-weight="700">Propose a minimal patch</text><rect x="661" y="107" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="121" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="197" r="11" fill="#334155"/><text x="49" y="200.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="201" font-size="15" fill="#0f172a" font-weight="700">Refute in parallel</text><rect x="597" y="187" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="659.5" y="201" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text></g><g class="lane-chrome"><circle cx="49" cy="391.5" r="11" fill="#334155"/><text x="49" y="395.2" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="72" y="396" font-size="14" fill="#0f172a" font-weight="600">Ship or bounce</text><text x="722" y="396" font-size="11" fill="#94a3b8" font-style="italic" text-anchor="end">control only</text></g></g>
