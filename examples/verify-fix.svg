<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="903.5" viewBox="0 0 1122 903.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="903.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Adversarially verify a fix</text><text x="46" y="77" font-size="13.5" fill="#475569">One worker proposes the smallest patch that makes a failing test pass; a panel of skeptics each tries to refute it, and it ships</text><text x="46" y="96" font-size="13.5" fill="#475569">only if they can&#39;t.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For a fix in a high-blast-radius area, where a plausible patch that merely silences the symptom is more dangerous than leaving</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">the bug open.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="651.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="173" x2="1098" y2="173" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="336" x2="1098" y2="336" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="502.5" x2="1098" y2="502.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Reproduce the failure</text><text x="80" y="54" font-size="12.5" fill="#475569">Confirm the bug reproduces</text><text x="80" y="71" font-size="12.5" fill="#475569">from a clean checkout and</text><text x="80" y="88" font-size="12.5" fill="#475569">capture the exact failing</text><text x="80" y="105" font-size="12.5" fill="#475569">assertion as the ground truth</text><text x="80" y="122" font-size="12.5" fill="#475569">every skeptic must respect.</text><circle cx="84" cy="137" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 173)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Propose a minimal patch</text><text x="80" y="54" font-size="12.5" fill="#475569">Find the root cause and write</text><text x="80" y="71" font-size="12.5" fill="#475569">the smallest patch (ideally &lt;</text><text x="80" y="88" font-size="12.5" fill="#475569">20 lines) that turns the test</text><text x="80" y="105" font-size="12.5" fill="#475569">green without weakening the</text><text x="80" y="122" font-size="12.5" fill="#475569">assertion.</text><circle cx="84" cy="137" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 336)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Refute in parallel</text><text x="80" y="54" font-size="12.5" fill="#475569">Spawn skeptics on distinct</text><text x="80" y="71" font-size="12.5" fill="#475569">lenses — correctness,</text><text x="80" y="88" font-size="12.5" fill="#475569">security, regressions — each</text><text x="80" y="105" font-size="12.5" fill="#475569">told to break the patch and</text><text x="80" y="122" font-size="12.5" fill="#475569">to default to rejecting it.</text><circle cx="84" cy="137" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 502.5)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Ship or bounce</text><text x="80" y="54" font-size="12.5" fill="#475569">Ship only if a majority of</text><text x="80" y="71" font-size="12.5" fill="#475569">skeptics fail to refute;</text><text x="80" y="88" font-size="12.5" fill="#475569">otherwise bounce the patch</text><text x="80" y="105" font-size="12.5" fill="#475569">back with their strongest</text><text x="80" y="122" font-size="12.5" fill="#475569">counter-example attached.</text><circle cx="84" cy="137" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 76 L 304 213" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,213 300.5,206 307.5,206" fill="#64748b"/></g><g class="edge"><path d="M 304 383 L 175.16 399" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,399 181.68,394.66 182.54,401.61" fill="#64748b"/></g><g class="edge"><path d="M 304 383 L 304 399" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,399 300.5,392 307.5,392" fill="#64748b"/></g><g class="edge"><path d="M 304 383 L 432.84 399" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,399 425.46,401.61 426.32,394.66" fill="#64748b"/></g><g class="edge"><path d="M 175.16 425 L 175.16 458.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,458.5 171.66,451.5 178.66,451.5" fill="#64748b"/></g><g class="edge"><path d="M 304 425 L 304 458.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,458.5 300.5,451.5 307.5,451.5" fill="#64748b"/></g><g class="edge"><path d="M 432.84 425 L 432.84 458.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,458.5 429.34,451.5 436.34,451.5" fill="#64748b"/></g><g class="edge"><path d="M 304 465.5 L 304 481.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,481.5 300.5,474.5 307.5,474.5" fill="#64748b"/></g><g class="edge"><path d="M 304 239 L 304 376" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,376 300.5,369 307.5,369" fill="#64748b"/></g><g class="edge"><path d="M 304 488.5 L 304 542.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,542.5 300.5,535.5 307.5,535.5" fill="#64748b"/></g><g class="agent-node"><title>Reproduce the bug from a clean checkout; quote the failing assertion.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="agent-node"><title>Write the smallest patch that fixes:\n${failing}</title><circle cx="304" cy="226" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="379.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="412" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="437" font-size="11" fill="#334155" text-anchor="middle">refute:correctness</text></g><g class="agent-node"><circle cx="304" cy="412" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="437" font-size="11" fill="#334155" text-anchor="middle">refute:security</text></g><g class="agent-node"><circle cx="432.84" cy="412" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="437" font-size="11" fill="#334155" text-anchor="middle">refute:regressions</text></g><rect class="barrier" x="162.16" y="458.5" width="283.68" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="485" r="3.5" fill="#94a3b8"/><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="542.5" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="561.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
</svg>
