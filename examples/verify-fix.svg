<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Adversarially verify a fix</text><text x="46" y="77" font-size="13.5" fill="#475569">One worker proposes the smallest patch that makes a failing test pass; a panel of skeptics each tries to refute it, and it ships</text><text x="46" y="96" font-size="13.5" fill="#475569">only if they can&#39;t.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For a fix in a high-blast-radius area, where a plausible patch that merely silences the symptom is more dangerous than leaving</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">the bug open.</text></g></g>
