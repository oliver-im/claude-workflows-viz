<svg xmlns="http://www.w3.org/2000/svg" width="760" height="847" viewBox="0 0 760 847" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="847" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Adversarially verify a fix</text><text x="46" y="77" font-size="13.5" fill="#475569">One worker proposes the smallest patch that makes a failing test pass; a panel of</text><text x="46" y="96" font-size="13.5" fill="#475569">skeptics each tries to refute it, and it ships only if they can&#39;t.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For a fix in a high-blast-radius area, where a plausible patch that merely</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">silences the symptom is more dangerous than leaving the bug open.</text></g></g>
<g transform="translate(0 204)"><g class="graph-band"><title>Confirm the bug reproduces from a clean checkout and capture the exact failing assertion as the ground truth every skeptic must respect.</title><rect x="24" y="0" width="712" height="149" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Reproduce the failure</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="42" y="54" font-size="11.5" fill="#64748b">Confirm the bug reproduces from a clean checkout and capture the exact failing assertion as the grou…</text><g class="agent-node"><title>Reproduce the bug from a clean checkout…</title><circle cx="86" cy="90" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="86" y="113" font-size="10.5" fill="#334155" text-anchor="middle">Reproduce the</text><text x="86" y="125" font-size="10.5" fill="#334155" text-anchor="middle">bug from a cl…</text></g></g></g>
<g transform="translate(0 369)"><g class="graph-band"><title>Find the root cause and write the smallest patch (ideally &lt; 20 lines) that turns the test green without weakening the assertion.</title><rect x="24" y="0" width="712" height="149" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Propose a minimal patch</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="42" y="54" font-size="11.5" fill="#64748b">Find the root cause and write the smallest patch (ideally &lt; 20 lines) that turns the test green with…</text><g class="agent-node"><title>Write the smallest patch that fixes:…</title><circle cx="86" cy="90" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="86" y="113" font-size="10.5" fill="#334155" text-anchor="middle">Write the</text><text x="86" y="125" font-size="10.5" fill="#334155" text-anchor="middle">smallest patc…</text></g></g></g>
<g transform="translate(0 534)"><g class="graph-band"><title>Spawn skeptics on distinct lenses — correctness, security, regressions — each told to break the patch and to default to rejecting it.</title><rect x="24" y="0" width="712" height="189" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Refute in parallel</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="42" y="54" font-size="11.5" fill="#64748b">Spawn skeptics on distinct lenses — correctness, security, regressions — each told to break the patc…</text><path d="M 64 90 L 208 90" fill="none" stroke="#475569" stroke-width="1.2"/><path d="M 64 124 L 208 124" fill="none" stroke="#475569" stroke-width="1.2"/><path d="M 64 158 L 208 158" fill="none" stroke="#475569" stroke-width="1.2"/><g class="agent-node"><title>refute:${lens}</title><circle cx="53" cy="90" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="70" y="84" font-size="10" fill="#334155">refute:correctne…</text><circle cx="53" cy="124" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="70" y="118" font-size="10" fill="#334155">refute:security</text><circle cx="53" cy="158" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="70" y="152" font-size="10" fill="#334155">refute:regressio…</text></g><rect class="barrier" x="208" y="71" width="6" height="106" rx="2" fill="#e8694a"/></g></g>
<g transform="translate(0 739)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Ship or bounce</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Ship only if a majority of skeptics fail to refute; otherwise bounce the patch back</text><text x="82" y="68" font-size="13" fill="#475569">with their strongest counter-example attached.</text></g></g>
</svg>
