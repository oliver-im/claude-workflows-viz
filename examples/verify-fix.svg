<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="876.5" viewBox="0 0 1122 876.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="876.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Adversarially verify a fix</text><text x="46" y="77" font-size="13.5" fill="#475569">One worker proposes the smallest patch that makes a failing test pass; a panel of skeptics each tries to refute it, and it ships</text><text x="46" y="96" font-size="13.5" fill="#475569">only if they can&#39;t.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For a fix in a high-blast-radius area, where a plausible patch that merely silences the symptom is more dangerous than leaving</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">the bug open.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="624.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="164" x2="1098" y2="164" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="318" x2="1098" y2="318" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="484.5" x2="1098" y2="484.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Reproduce the failure</text><text x="74" y="48" font-size="12.5" fill="#475569">Confirm the bug reproduces</text><text x="74" y="65" font-size="12.5" fill="#475569">from a clean checkout and</text><text x="74" y="82" font-size="12.5" fill="#475569">capture the exact failing</text><text x="74" y="99" font-size="12.5" fill="#475569">assertion as the ground truth</text><text x="74" y="116" font-size="12.5" fill="#475569">every skeptic must respect.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g transform="translate(0 164)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Propose a minimal patch</text><text x="74" y="48" font-size="12.5" fill="#475569">Find the root cause and write</text><text x="74" y="65" font-size="12.5" fill="#475569">the smallest patch (ideally &lt;</text><text x="74" y="82" font-size="12.5" fill="#475569">20 lines) that turns the test</text><text x="74" y="99" font-size="12.5" fill="#475569">green without weakening the</text><text x="74" y="116" font-size="12.5" fill="#475569">assertion.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 318)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Refute in parallel</text><text x="74" y="48" font-size="12.5" fill="#475569">Spawn skeptics on distinct</text><text x="74" y="65" font-size="12.5" fill="#475569">lenses — correctness,</text><text x="74" y="82" font-size="12.5" fill="#475569">security, regressions — each</text><text x="74" y="99" font-size="12.5" fill="#475569">told to break the patch and to</text><text x="74" y="116" font-size="12.5" fill="#475569">default to rejecting it.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: claude-opus-4-8</text></g></g><g transform="translate(0 484.5)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Ship or bounce</text><text x="74" y="48" font-size="12.5" fill="#475569">Ship only if a majority of</text><text x="74" y="65" font-size="12.5" fill="#475569">skeptics fail to refute;</text><text x="74" y="82" font-size="12.5" fill="#475569">otherwise bounce the patch</text><text x="74" y="99" font-size="12.5" fill="#475569">back with their strongest</text><text x="74" y="116" font-size="12.5" fill="#475569">counter-example attached.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 76 L 304 204" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,204 300.5,197 307.5,197" fill="#64748b"/></g><g class="edge"><path d="M 304 365 L 175.16 381" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,381 181.68,376.66 182.54,383.61" fill="#64748b"/></g><g class="edge"><path d="M 304 365 L 304 381" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,381 300.5,374 307.5,374" fill="#64748b"/></g><g class="edge"><path d="M 304 365 L 432.84 381" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,381 425.46,383.61 426.32,376.66" fill="#64748b"/></g><g class="edge"><path d="M 175.16 407 L 175.16 440.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,440.5 171.66,433.5 178.66,433.5" fill="#64748b"/></g><g class="edge"><path d="M 304 407 L 304 440.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,440.5 300.5,433.5 307.5,433.5" fill="#64748b"/></g><g class="edge"><path d="M 432.84 407 L 432.84 440.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,440.5 429.34,433.5 436.34,433.5" fill="#64748b"/></g><g class="edge"><path d="M 304 447.5 L 304 463.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,463.5 300.5,456.5 307.5,456.5" fill="#64748b"/></g><g class="edge"><path d="M 304 230 L 304 358" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,358 300.5,351 307.5,351" fill="#64748b"/></g><g class="edge"><path d="M 304 470.5 L 304 524.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,524.5 300.5,517.5 307.5,517.5" fill="#64748b"/></g><g class="agent-node"><title>Reproduce the bug from a clean checkout; quote the failing assertion.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="agent-node"><title>Write the smallest patch that fixes:\n${failing}</title><circle cx="304" cy="217" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="361.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="394" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="419" font-size="11" fill="#334155" text-anchor="middle">refute:correctness</text></g><g class="agent-node"><circle cx="304" cy="394" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="419" font-size="11" fill="#334155" text-anchor="middle">refute:security</text></g><g class="agent-node"><circle cx="432.84" cy="394" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="419" font-size="11" fill="#334155" text-anchor="middle">refute:regressions</text></g><rect class="barrier" x="162.16" y="440.5" width="283.68" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="467" r="3.5" fill="#94a3b8"/><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="524.5" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="543.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
</svg>
