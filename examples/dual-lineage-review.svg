<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="885" viewBox="0 0 1122 885" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="885" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a change with two lineages</text><text x="46" y="77" font-size="13.5" fill="#475569">Review the same diff with two independent reviewers — one Claude, one external — and merge only what both lineages agree is real,</text><text x="46" y="96" font-size="13.5" fill="#475569">killing single-model blind spots.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a risky change, when one model&#39;s blind spots are the failure mode and a second, differently-trained reviewer is</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">cheap insurance.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="633" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="164" x2="1098" y2="164" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="337" x2="1098" y2="337" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="493" x2="1098" y2="493" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Scope the diff</text><text x="74" y="48" font-size="12.5" fill="#475569">Compute the cumulative diff</text><text x="74" y="65" font-size="12.5" fill="#475569">against the base branch and</text><text x="74" y="82" font-size="12.5" fill="#475569">split it into focus targets</text><text x="74" y="99" font-size="12.5" fill="#475569">the reviewers can attack</text><text x="74" y="116" font-size="12.5" fill="#475569">independently.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g transform="translate(0 164)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Claude review</text><text x="74" y="48" font-size="12.5" fill="#475569">A Claude reviewer reads the</text><text x="74" y="65" font-size="12.5" fill="#475569">diff for correctness,</text><text x="74" y="82" font-size="12.5" fill="#475569">security, and convention</text><text x="74" y="99" font-size="12.5" fill="#475569">drift, reporting each finding</text><text x="74" y="116" font-size="12.5" fill="#475569">with file:line and a</text><text x="74" y="133" font-size="12.5" fill="#475569">confidence.</text><text x="74" y="151" font-size="11.5" fill="#94a3b8" font-style="italic">model: claude-opus-4-8</text></g></g><g transform="translate(0 337)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">External review</text><text x="74" y="48" font-size="12.5" fill="#475569">A second, non-Claude reviewer</text><text x="74" y="65" font-size="12.5" fill="#475569">audits the same diff from</text><text x="74" y="82" font-size="12.5" fill="#475569">scratch — its different</text><text x="74" y="99" font-size="12.5" fill="#475569">training surfaces issues the</text><text x="74" y="116" font-size="12.5" fill="#475569">first lineage anchors past.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: gpt-5-codex</text></g></g><g transform="translate(0 493)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Merge the verdicts</text><text x="74" y="48" font-size="12.5" fill="#475569">Keep findings both lineages</text><text x="74" y="65" font-size="12.5" fill="#475569">raise, flag the disagreements</text><text x="74" y="82" font-size="12.5" fill="#475569">for a human, and drop what</text><text x="74" y="99" font-size="12.5" fill="#475569">neither can defend on a second</text><text x="74" y="116" font-size="12.5" fill="#475569">pass.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 211 L 239 227" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="239,227 244.96,221.93 246.63,228.73" fill="#64748b"/></g><g class="edge"><path d="M 304 211 L 369 379" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="369,379 363.21,373.73 369.74,371.21" fill="#64748b"/></g><g class="edge"><path d="M 239 253 L 304 446" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,446 298.45,440.48 305.08,438.25" fill="#64748b"/></g><g class="edge"><path d="M 369 405 L 304 446" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,446 308.05,439.31 311.79,445.23" fill="#64748b"/></g><g class="edge"><path d="M 304 453 L 304 469" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,469 300.5,462 307.5,462" fill="#64748b"/></g><g class="edge"><path d="M 304 76 L 304 204" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,204 300.5,197 307.5,197" fill="#64748b"/></g><g class="edge"><path d="M 304 476 L 304 533" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,533 300.5,526 307.5,526" fill="#64748b"/></g><g class="agent-node"><title>Compute the diff vs main and split it into focus targets.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="207.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Review these targets for correctness, security, conventions:\n${JSON.stringify(…</title><circle cx="239" cy="240" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="239" y="265" font-size="11" fill="#334155" text-anchor="middle">review:claude</text></g><g class="agent-node"><title>Independently audit the same targets:\n${JSON.stringify(targets.targets)}</title><circle cx="369" cy="392" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="369" y="417" font-size="11" fill="#334155" text-anchor="middle">review:external</text></g><rect class="barrier" x="287" y="446" width="34" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="472.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Keep what both reviews agree on, flag the disagreements:\n${claudeFindings}\n--…</title><circle cx="304" cy="546" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
</svg>
