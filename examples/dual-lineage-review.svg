<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="921" viewBox="0 0 1122 921" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="921" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a change with two lineages</text><text x="46" y="77" font-size="13.5" fill="#475569">Review the same diff with two independent reviewers — one Claude, one external — and merge only what both lineages agree is real,</text><text x="46" y="96" font-size="13.5" fill="#475569">killing single-model blind spots.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a risky change, when one model&#39;s blind spots are the failure mode and a second, differently-trained reviewer is</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">cheap insurance.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="669" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="173" x2="1098" y2="173" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="355" x2="1098" y2="355" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="520" x2="1098" y2="520" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Scope the diff</text><text x="80" y="54" font-size="12.5" fill="#475569">Compute the cumulative diff</text><text x="80" y="71" font-size="12.5" fill="#475569">against the base branch and</text><text x="80" y="88" font-size="12.5" fill="#475569">split it into focus targets</text><text x="80" y="105" font-size="12.5" fill="#475569">the reviewers can attack</text><text x="80" y="122" font-size="12.5" fill="#475569">independently.</text><circle cx="84" cy="137" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 173)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Claude review</text><text x="80" y="54" font-size="12.5" fill="#475569">A Claude reviewer reads the</text><text x="80" y="71" font-size="12.5" fill="#475569">diff for correctness,</text><text x="80" y="88" font-size="12.5" fill="#475569">security, and convention</text><text x="80" y="105" font-size="12.5" fill="#475569">drift, reporting each finding</text><text x="80" y="122" font-size="12.5" fill="#475569">with file:line and a</text><text x="80" y="139" font-size="12.5" fill="#475569">confidence.</text><circle cx="84" cy="154" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="158" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 355)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">External review</text><text x="80" y="54" font-size="12.5" fill="#475569">A second, non-Claude reviewer</text><text x="80" y="71" font-size="12.5" fill="#475569">audits the same diff from</text><text x="80" y="88" font-size="12.5" fill="#475569">scratch — its different</text><text x="80" y="105" font-size="12.5" fill="#475569">training surfaces issues the</text><text x="80" y="122" font-size="12.5" fill="#475569">first lineage anchors past.</text><circle cx="84" cy="137" r="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: gpt-5-codex</text></g></g><g transform="translate(0 520)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Merge the verdicts</text><text x="80" y="54" font-size="12.5" fill="#475569">Keep findings both lineages</text><text x="80" y="71" font-size="12.5" fill="#475569">raise, flag the disagreements</text><text x="80" y="88" font-size="12.5" fill="#475569">for a human, and drop what</text><text x="80" y="105" font-size="12.5" fill="#475569">neither can defend on a</text><text x="80" y="122" font-size="12.5" fill="#475569">second pass.</text><circle cx="84" cy="137" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 220 L 239 236" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="239,236 244.96,230.93 246.63,237.73" fill="#64748b"/></g><g class="edge"><path d="M 304 220 L 369 397" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="369,397 363.3,391.64 369.87,389.22" fill="#64748b"/></g><g class="edge"><path d="M 239 262 L 304 464" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,464 298.52,458.41 305.19,456.26" fill="#64748b"/></g><g class="edge"><path d="M 369 423 L 304 464" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,464 308.05,457.31 311.79,463.23" fill="#64748b"/></g><g class="edge"><path d="M 304 471 L 304 487" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,487 300.5,480 307.5,480" fill="#64748b"/></g><g class="edge"><path d="M 304 76 L 304 213" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,213 300.5,206 307.5,206" fill="#64748b"/></g><g class="edge"><path d="M 304 494 L 304 560" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,560 300.5,553 307.5,553" fill="#64748b"/></g><g class="agent-node"><title>Compute the diff vs main and split it into focus targets.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="216.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Review these targets for correctness, security, conventions:\n${JSON.stringify(…</title><circle cx="239" cy="249" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="239" y="274" font-size="11" fill="#334155" text-anchor="middle">review:claude</text></g><g class="agent-node"><title>Independently audit the same targets:\n${JSON.stringify(targets.targets)}</title><circle cx="369" cy="410" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="369" y="435" font-size="11" fill="#334155" text-anchor="middle">review:external</text></g><rect class="barrier" x="287" y="464" width="34" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="490.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Keep what both reviews agree on, flag the disagreements:\n${claudeFindings}\n--…</title><circle cx="304" cy="573" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
</svg>
