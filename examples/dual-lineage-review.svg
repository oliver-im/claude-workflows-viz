<svg xmlns="http://www.w3.org/2000/svg" width="760" height="612" viewBox="0 0 760 612" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="612" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a change with two lineages</text><text x="46" y="77" font-size="13.5" fill="#475569">Review the same diff with two independent reviewers — one Claude, one external — and</text><text x="46" y="96" font-size="13.5" fill="#475569">merge only what both lineages agree is real, killing single-model blind spots.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a risky change, when one model&#39;s blind spots are the failure</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">mode and a second, differently-trained reviewer is cheap insurance.</text></g></g>
<g transform="translate(0 204)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Scope the diff</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="82" y="50" font-size="13" fill="#475569">Compute the cumulative diff against the base branch and split it into focus targets</text><text x="82" y="68" font-size="13" fill="#475569">the reviewers can attack independently.</text></g></g>
<g transform="translate(0 304)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Claude review</text><rect x="593" y="17" width="125" height="20" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="655.5" y="31" font-size="11.5" fill="#3b0764" font-weight="600" text-anchor="middle">claude-opus-4-8</text><text x="82" y="50" font-size="13" fill="#475569">A Claude reviewer reads the diff for correctness, security, and convention drift,</text><text x="82" y="68" font-size="13" fill="#475569">reporting each finding with file:line and a confidence.</text></g></g>
<g transform="translate(0 404)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">External review</text><rect x="621" y="17" width="97" height="20" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><text x="669.5" y="31" font-size="11.5" fill="#334155" font-weight="600" text-anchor="middle">gpt-5-codex</text><text x="82" y="50" font-size="13" fill="#475569">A second, non-Claude reviewer audits the same diff from scratch — its different</text><text x="82" y="68" font-size="13" fill="#475569">training surfaces issues the first lineage anchors past.</text></g></g>
<g transform="translate(0 504)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Merge the verdicts</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="82" y="50" font-size="13" fill="#475569">Keep findings both lineages raise, flag the disagreements for a human, and drop what</text><text x="82" y="68" font-size="13" fill="#475569">neither can defend on a second pass.</text></g></g>
</svg>
