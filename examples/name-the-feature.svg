<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="659.5" viewBox="0 0 1122 659.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="659.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="118" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Name a new feature</text><text x="46" y="77" font-size="13.5" fill="#475569">Several generators each pitch a batch of candidate names; one filter scores them for clarity &amp; memorability, dedupes</text><text x="46" y="96" font-size="13.5" fill="#475569">near-collisions, and keeps the best.</text></g></g>
<g transform="translate(0 158)"><rect x="24" y="12" width="1074" height="453.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="176.5" x2="1098" y2="176.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="330.5" x2="1098" y2="330.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Generate candidates</text><text x="74" y="48" font-size="12.5" fill="#475569">Run generators with different</text><text x="74" y="65" font-size="12.5" fill="#475569">framings — literal, playful,</text><text x="74" y="82" font-size="12.5" fill="#475569">metaphorical — so the pool is</text><text x="74" y="99" font-size="12.5" fill="#475569">genuinely diverse, not</text><text x="74" y="116" font-size="12.5" fill="#475569">variations on one idea.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 176.5)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Filter by rubric and ded…</text><text x="74" y="48" font-size="12.5" fill="#475569">Score every name on clarity,</text><text x="74" y="65" font-size="12.5" fill="#475569">memorability, and</text><text x="74" y="82" font-size="12.5" fill="#475569">availability, collapse</text><text x="74" y="99" font-size="12.5" fill="#475569">near-duplicates, and discard</text><text x="74" y="116" font-size="12.5" fill="#475569">everything below the bar.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: claude-opus-4-8</text></g></g><g transform="translate(0 330.5)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Shortlist the best</text><text x="74" y="48" font-size="12.5" fill="#475569">Return the top handful with a</text><text x="74" y="65" font-size="12.5" fill="#475569">one-line rationale each, plus</text><text x="74" y="82" font-size="12.5" fill="#475569">the strongest candidate that</text><text x="74" y="99" font-size="12.5" fill="#475569">was cut and why it lost.</text><text x="74" y="117" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 57 L 187.92 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="187.92,73 194.38,68.58 195.33,75.51" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 304 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,73 300.5,66 307.5,66" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 420.08 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="420.08,73 412.67,75.51 413.62,68.58" fill="#64748b"/></g><g class="edge"><path d="M 187.92 99 L 187.92 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="187.92,132.5 184.42,125.5 191.42,125.5" fill="#64748b"/></g><g class="edge"><path d="M 304 99 L 304 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,132.5 300.5,125.5 307.5,125.5" fill="#64748b"/></g><g class="edge"><path d="M 420.08 99 L 420.08 132.5" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="420.08,132.5 416.58,125.5 423.58,125.5" fill="#64748b"/></g><g class="edge"><path d="M 304 139.5 L 304 155.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,155.5 300.5,148.5 307.5,148.5" fill="#64748b"/></g><g class="edge"><path d="M 304 162.5 L 304 216.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,216.5 300.5,209.5 307.5,209.5" fill="#64748b"/></g><g class="edge"><path d="M 304 242.5 L 304 370.5" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,370.5 300.5,363.5 307.5,363.5" fill="#64748b"/></g><circle class="hub" cx="304" cy="53.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="187.92" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="187.92" y="111" font-size="11" fill="#334155" text-anchor="middle">gen:literal</text></g><g class="agent-node"><circle cx="304" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="111" font-size="11" fill="#334155" text-anchor="middle">gen:playful</text></g><g class="agent-node"><circle cx="420.08" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="420.08" y="111" font-size="11" fill="#334155" text-anchor="middle">gen:metaphorical</text></g><rect class="barrier" x="174.92" y="132.5" width="258.16" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="159" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Score, dedupe, and filter these names by clarity &amp; memorability:\n${JSON.string…</title><circle cx="304" cy="229.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="agent-node"><title>Pick the top 5 with a rationale from:\n${JSON.stringify(kept.kept)}</title><circle cx="304" cy="383.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
