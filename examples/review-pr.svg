<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a pull request</text><text x="46" y="77" font-size="13.5" fill="#475569">Review a branch&#39;s diff across independent dimensions, adversarially verify each</text><text x="46" y="96" font-size="13.5" fill="#475569">finding, then synthesize a ranked report.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a sizable or unfamiliar PR, when a single reviewer pass risks</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">missing correctness, security, or performance regressions.</text></g></g>
