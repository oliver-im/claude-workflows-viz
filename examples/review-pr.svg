<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="857" viewBox="0 0 1122 857" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="857" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="145" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a pull request</text><text x="46" y="77" font-size="13.5" fill="#475569">Review a branch&#39;s diff across independent dimensions, adversarially verify each finding, then synthesize a ranked report.</text><text x="46" y="106" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a sizable or unfamiliar PR, when a single reviewer pass risks missing correctness, security, or performance</text><text x="46" y="123" font-size="12.5" fill="#64748b" font-style="italic">regressions.</text></g></g>
<g transform="translate(0 185)"><rect x="24" y="12" width="1074" height="624" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="173" x2="1098" y2="173" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="341" x2="1098" y2="341" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="492" x2="1098" y2="492" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Map the diff</text><text x="80" y="54" font-size="12.5" fill="#475569">List changed files against</text><text x="80" y="71" font-size="12.5" fill="#475569">the base branch and group</text><text x="80" y="88" font-size="12.5" fill="#475569">them by subsystem so each</text><text x="80" y="105" font-size="12.5" fill="#475569">reviewer gets a focused</text><text x="80" y="122" font-size="12.5" fill="#475569">slice.</text><circle cx="84" cy="137" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 173)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Review by dimension</text><text x="80" y="54" font-size="12.5" fill="#475569">One agent per dimension —</text><text x="80" y="71" font-size="12.5" fill="#475569">correctness, security,</text><text x="80" y="88" font-size="12.5" fill="#475569">performance — reviews its</text><text x="80" y="105" font-size="12.5" fill="#475569">slice and reports findings</text><text x="80" y="122" font-size="12.5" fill="#475569">with file:line.</text><circle cx="84" cy="137" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 341)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Adversarially verify</text><text x="80" y="54" font-size="12.5" fill="#475569">Spawn a panel of skeptics per</text><text x="80" y="71" font-size="12.5" fill="#475569">finding, each prompted to</text><text x="80" y="88" font-size="12.5" fill="#475569">refute it; drop anything the</text><text x="80" y="105" font-size="12.5" fill="#475569">panel cannot defend.</text><circle cx="84" cy="120" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 492)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Synthesize the report</text><text x="80" y="54" font-size="12.5" fill="#475569">Dedupe the survivors, rank</text><text x="80" y="71" font-size="12.5" fill="#475569">them by severity, and write</text><text x="80" y="88" font-size="12.5" fill="#475569">the review with reproducible</text><text x="80" y="105" font-size="12.5" fill="#475569">citations.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 175.16 262 L 175.16 386" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="175.16,386 171.66,379 178.66,379" fill="#64748b"/></g><g class="edge"><path d="M 304 220 L 175.16 236" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,236 181.68,231.66 182.54,238.61" fill="#64748b"/></g><g class="edge"><path d="M 304 262 L 304 386" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,386 300.5,379 307.5,379" fill="#64748b"/></g><g class="edge"><path d="M 304 220 L 304 236" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,236 300.5,229 307.5,229" fill="#64748b"/></g><g class="edge"><path d="M 432.84 262 L 432.84 386" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="432.84,386 429.34,379 436.34,379" fill="#64748b"/></g><g class="edge"><path d="M 304 220 L 432.84 236" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,236 425.46,238.61 426.32,231.66" fill="#64748b"/></g><g class="edge"><path d="M 175.16 412 L 304 449" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,449 296.31,450.43 298.24,443.7" fill="#64748b"/></g><g class="edge"><path d="M 304 412 L 304 449" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,449 300.5,442 307.5,442" fill="#64748b"/></g><g class="edge"><path d="M 432.84 412 L 304 449" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,449 309.76,443.7 311.69,450.43" fill="#64748b"/></g><g class="edge"><path d="M 304 76 L 304 213" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,213 300.5,206 307.5,206" fill="#64748b"/></g><g class="edge"><path d="M 304 456 L 304 532" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,532 300.5,525 307.5,525" fill="#64748b"/></g><g class="agent-node"><title>List changed files vs main, grouped by subsystem.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="216.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="249" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="274" font-size="11" fill="#334155" text-anchor="middle">review:correctness</text></g><g class="agent-node"><circle cx="177.16" cy="401" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="175.16" cy="399" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="424" font-size="11" fill="#334155" text-anchor="middle">verify:${f.title}</text><text x="189.16" y="388" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="agent-node"><circle cx="304" cy="249" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="274" font-size="11" fill="#334155" text-anchor="middle">review:security</text></g><g class="agent-node"><circle cx="306" cy="401" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="399" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="424" font-size="11" fill="#334155" text-anchor="middle">verify:${f.title}</text><text x="318" y="388" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="agent-node"><circle cx="432.84" cy="249" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="274" font-size="11" fill="#334155" text-anchor="middle">review:performance</text></g><g class="agent-node"><circle cx="434.84" cy="401" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="432.84" cy="399" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="424" font-size="11" fill="#334155" text-anchor="middle">verify:${f.title}</text><text x="446.84" y="388" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><circle class="hub" cx="304" cy="452.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Write a ranked review of: ${JSON.stringify(confirmed)}</title><circle cx="304" cy="545" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
</svg>
