<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="804" viewBox="0 0 1122 804" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="804" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="145" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a pull request</text><text x="46" y="77" font-size="13.5" fill="#475569">Review a branch&#39;s diff across independent dimensions, adversarially verify each finding, then synthesize a ranked report.</text><text x="46" y="106" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a sizable or unfamiliar PR, when a single reviewer pass risks missing correctness, security, or performance</text><text x="46" y="123" font-size="12.5" fill="#64748b" font-style="italic">regressions.</text></g></g>
<g transform="translate(0 185)"><rect x="24" y="12" width="1074" height="571" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="147" x2="1098" y2="147" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="306" x2="1098" y2="306" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="448" x2="1098" y2="448" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Map the diff</text><text x="74" y="48" font-size="12.5" fill="#475569">List changed files against the</text><text x="74" y="65" font-size="12.5" fill="#475569">base branch and group them by</text><text x="74" y="82" font-size="12.5" fill="#475569">subsystem so each reviewer</text><text x="74" y="99" font-size="12.5" fill="#475569">gets a focused slice.</text><text x="74" y="117" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g transform="translate(0 147)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Review by dimension</text><text x="74" y="48" font-size="12.5" fill="#475569">One agent per dimension —</text><text x="74" y="65" font-size="12.5" fill="#475569">correctness, security,</text><text x="74" y="82" font-size="12.5" fill="#475569">performance — reviews its</text><text x="74" y="99" font-size="12.5" fill="#475569">slice and reports findings</text><text x="74" y="116" font-size="12.5" fill="#475569">with file:line.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 306)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Adversarially verify</text><text x="74" y="48" font-size="12.5" fill="#475569">Spawn a panel of skeptics per</text><text x="74" y="65" font-size="12.5" fill="#475569">finding, each prompted to</text><text x="74" y="82" font-size="12.5" fill="#475569">refute it; drop anything the</text><text x="74" y="99" font-size="12.5" fill="#475569">panel cannot defend.</text><text x="74" y="117" font-size="11.5" fill="#94a3b8" font-style="italic">model: claude-opus-4-8</text></g></g><g transform="translate(0 448)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Synthesize the report</text><text x="74" y="48" font-size="12.5" fill="#475569">Dedupe the survivors, rank</text><text x="74" y="65" font-size="12.5" fill="#475569">them by severity, and write</text><text x="74" y="82" font-size="12.5" fill="#475569">the review with reproducible</text><text x="74" y="99" font-size="12.5" fill="#475569">citations.</text><text x="74" y="117" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 175.16 236 L 175.16 351" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="175.16,351 171.66,344 178.66,344" fill="#64748b"/></g><g class="edge"><path d="M 304 194 L 175.16 210" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="175.16,210 181.68,205.66 182.54,212.61" fill="#64748b"/></g><g class="edge"><path d="M 304 236 L 304 351" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,351 300.5,344 307.5,344" fill="#64748b"/></g><g class="edge"><path d="M 304 194 L 304 210" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,210 300.5,203 307.5,203" fill="#64748b"/></g><g class="edge"><path d="M 432.84 236 L 432.84 351" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="432.84,351 429.34,344 436.34,344" fill="#64748b"/></g><g class="edge"><path d="M 304 194 L 432.84 210" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="432.84,210 425.46,212.61 426.32,205.66" fill="#64748b"/></g><g class="edge"><path d="M 175.16 377 L 304 414" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,414 296.31,415.43 298.24,408.7" fill="#64748b"/></g><g class="edge"><path d="M 304 377 L 304 414" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,414 300.5,407 307.5,407" fill="#64748b"/></g><g class="edge"><path d="M 432.84 377 L 304 414" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,414 309.76,408.7 311.69,415.43" fill="#64748b"/></g><g class="edge"><path d="M 304 76 L 304 187" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,187 300.5,180 307.5,180" fill="#64748b"/></g><g class="edge"><path d="M 304 421 L 304 488" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,488 300.5,481 307.5,481" fill="#64748b"/></g><g class="agent-node"><title>List changed files vs main, grouped by subsystem.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="190.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="175.16" cy="223" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="248" font-size="11" fill="#334155" text-anchor="middle">review:correctness</text></g><g class="agent-node"><circle cx="177.16" cy="366" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="175.16" cy="364" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="175.16" y="389" font-size="11" fill="#334155" text-anchor="middle">verify:${f.title}</text><text x="189.16" y="353" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="agent-node"><circle cx="304" cy="223" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="248" font-size="11" fill="#334155" text-anchor="middle">review:security</text></g><g class="agent-node"><circle cx="306" cy="366" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="364" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="389" font-size="11" fill="#334155" text-anchor="middle">verify:${f.title}</text><text x="318" y="353" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="agent-node"><circle cx="432.84" cy="223" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="248" font-size="11" fill="#334155" text-anchor="middle">review:performance</text></g><g class="agent-node"><circle cx="434.84" cy="366" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="432.84" cy="364" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="432.84" y="389" font-size="11" fill="#334155" text-anchor="middle">verify:${f.title}</text><text x="446.84" y="353" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><circle class="hub" cx="304" cy="417.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Write a ranked review of: ${JSON.stringify(confirmed)}</title><circle cx="304" cy="501" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
</svg>
