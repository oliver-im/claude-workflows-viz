erything below the bar.</text><circle cx="84" cy="103" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 297.5)"><g class="lane-label"><title>Return the top handful with a one-line rationale each, plus the strongest candidate that was cut and why it lost.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Shortlist the best</text><text x="80" y="54" font-size="12.5" fill="#475569">Return the top handful with a one-line</text><text x="80" y="71" font-size="12.5" fill="#475569">rationale each, plus the strongest candidate</text><text x="80" y="88" font-size="12.5" fill="#475569">that was cut and why it lost.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(315 0)"><g class="edge"><path d="M 304 57 L 187.92 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="187.92,73 194.38,68.58 195.33,75.51" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 304 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,73 300.5,66 307.5,66" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 420.08 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="420.08,73 412.67,75.51 413.62,68.58" fill="#64748b"/></g><g class="edge"><path d="M 187.92 99 L 187.92 124.5" fill="none" stroke="#64748b" stroke-width="1.1"/></g><g class="edge"><path d="M 304 99 L 304 124.5" fill="none" stroke="#64748b" stroke-width="1.1"/></g><g class="edge"><path d="M 420.08 99 L 420.08 124.5" fill="none" stroke="#64748b" stroke-width="1.1"/></g><g class="edge"><path d="M 304 131.5 L 304 147.5" fill="none" stroke