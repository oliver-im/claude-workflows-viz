<svg xmlns="http://www.w3.org/2000/svg" width="760" height="790" viewBox="0 0 760 790" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="790" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Triage an incoming issue</text><text x="46" y="77" font-size="13.5" fill="#475569">Classify a new bug report by subsystem, then route it to the one matching specialist</text><text x="46" y="96" font-size="13.5" fill="#475569">to draft a fix — three of the four branches never run.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When reports arrive faster than one engineer can read them and almost every</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">issue belongs to a small, predictable set of subsystems.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="712" height="516" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="139" x2="736" y2="139" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="270" x2="736" y2="270" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="401" x2="736" y2="401" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Read the title and body and label the issue as frontend, backend, infra, or docs, picking the single best-fit owner with a confidence score.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Classify the report</text><text x="80" y="54" font-size="12.5" fill="#475569">Read the title and body and label the issue as</text><text x="80" y="71" font-size="12.5" fill="#475569">frontend, backend, infra, or docs, picking the</text><text x="80" y="88" font-size="12.5" fill="#475569">single best-fit owner with a confidence score.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 139)"><g class="lane-label"><title>Dispatch only to the matching agent — frontend &amp; backend, infra, or docs — so the three branches that don&#39;t apply are never spawned.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Route to a specialist</text><text x="80" y="54" font-size="12.5" fill="#475569">Dispatch only to the matching agent — frontend</text><text x="80" y="71" font-size="12.5" fill="#475569">&amp; backend, infra, or docs — so the three</text><text x="80" y="88" font-size="12.5" fill="#475569">branches that don&#39;t apply are never spawned.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 270)"><g class="lane-label"><title>The chosen specialist reproduces the bug, isolates the root cause, and writes a step-by-step plan naming the files to change.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Draft a fix</text><text x="80" y="54" font-size="12.5" fill="#475569">The chosen specialist reproduces the bug,</text><text x="80" y="71" font-size="12.5" fill="#475569">isolates the root cause, and writes a</text><text x="80" y="88" font-size="12.5" fill="#475569">step-by-step plan naming the files to change.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 401)"><g class="lane-label"><title>Post the plan back on the issue with a severity label and an owner, or escalate to a human when the classifier&#39;s confidence was low.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Reply or escalate</text><text x="80" y="54" font-size="12.5" fill="#475569">Post the plan back on the issue with a severity</text><text x="80" y="71" font-size="12.5" fill="#475569">label and an owner, or escalate to a human when</text><text x="80" y="88" font-size="12.5" fill="#475569">the classifier&#39;s confidence was low.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(212 0)"><g class="edge"><path d="M 304 201 L 434 221" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,221 426.55,223.39 427.61,216.48" fill="#64748b"/><text x="374" y="211" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 201 L 304 312" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,312 300.5,305 307.5,305" fill="#64748b"/><text x="309" y="256.5" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 179" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,179 300.5,172 307.5,172" fill="#64748b"/></g><g class="edge"><path d="M 434 228 L 304 441" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,441 304.66,433.2 310.63,436.85" fill="#64748b"/></g><g class="edge"><path d="M 304 338 L 304 441" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,441 300.5,434 307.5,434" fill="#64748b"/></g><g class="agent-node"><title>Classify this issue into one of ${SPECIALISTS.join(&quot;, &quot;)}:\n${args.issueBody}</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="decision"><title>confidence &lt; 0.5</title><polygon points="304,179 315,190 304,201 293,190" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><rect x="318" y="183.7" width="108.08" height="14" fill="#ffffff"/><text x="321" y="194" font-size="11" fill="#94a3b8" font-style="italic">confidence &lt; 0.5</text></g><circle class="hub" cx="434" cy="224.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>As the ${area} specialist, draft a fix plan for:\n${args.issueBody}</title><circle cx="304" cy="325" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><rect x="322" y="317.5" width="85.75" height="15.5" fill="#ffffff"/><text x="325" y="329" font-size="12.5" fill="#334155">fix:${area}</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="441" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="460" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
<g class="provenance"><text x="736" y="781" font-size="10.5" fill="#94a3b8" text-anchor="end">v0.1.0</text></g>
</svg>
