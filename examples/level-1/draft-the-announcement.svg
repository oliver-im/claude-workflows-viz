<svg xmlns="http://www.w3.org/2000/svg" width="849" height="768" viewBox="0 0 849 768" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="849" height="768" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="801" height="183" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Draft a launch announcement</text><text x="46" y="77" font-size="13.5" fill="#475569">Draft the same announcement from several independent angles, score every draft against a panel</text><text x="46" y="96" font-size="13.5" fill="#475569">of judges each applying one rubric lens, then synthesize the winner and graft in the best lines</text><text x="46" y="115" font-size="13.5" fill="#475569">from the runners-up.</text><text x="46" y="144" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the solution space is wide and one draft iterated rarely beats several independent</text><text x="46" y="161" font-size="12.5" fill="#64748b" font-style="italic">attempts judged in parallel — and the best version borrows a line or two from the ones it beat.</text></g></g>
<g transform="translate(0 223)"><rect x="24" y="12" width="801" height="475" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="176.5" x2="825" y2="176.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="343" x2="825" y2="343" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Spin up one writer per angle — MVP-first, risk-first, user-first — each producing a full self-contained draft, not a variation on a single shared outline.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Draft from each angle</text><text x="80" y="54" font-size="12.5" fill="#475569">Spin up one writer per angle — MVP-first,</text><text x="80" y="71" font-size="12.5" fill="#475569">risk-first, user-first — each producing a full</text><text x="80" y="88" font-size="12.5" fill="#475569">self-contained draft, not a variation on a</text><text x="80" y="105" font-size="12.5" fill="#475569">single shared outline.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 176.5)"><g class="lane-label"><title>A panel of judges scores all drafts at once, each judge ranking them on one rubric lens — clarity, credibility, memorability — so no single taste decides the winner.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Score on the panel</text><text x="80" y="54" font-size="12.5" fill="#475569">A panel of judges scores all drafts at once,</text><text x="80" y="71" font-size="12.5" fill="#475569">each judge ranking them on one rubric lens —</text><text x="80" y="88" font-size="12.5" fill="#475569">clarity, credibility, memorability — so no</text><text x="80" y="105" font-size="12.5" fill="#475569">single taste decides the winner.</text><circle cx="84" cy="120" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 343)"><g class="lane-label"><title>Take the panel&#39;s top-ranked draft and graft in the strongest lines from the runners-up, producing one version better than any single attempt.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Synthesize the winner</text><text x="80" y="54" font-size="12.5" fill="#475569">Take the panel&#39;s top-ranked draft and graft in</text><text x="80" y="71" font-size="12.5" fill="#475569">the strongest lines from the runners-up,</text><text x="80" y="88" font-size="12.5" fill="#475569">producing one version better than any single</text><text x="80" y="105" font-size="12.5" fill="#475569">attempt.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(334 0)"><g class="edge"><path d="M 304 57 L 187.92 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="187.92,73 194.38,68.58 195.33,75.51" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 304 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,73 300.5,66 307.5,66" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 420.08 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="420.08,73 412.67,75.51 413.62,68.58" fill="#64748b"/></g><g class="edge"><path d="M 187