<svg xmlns="http://www.w3.org/2000/svg" width="964" height="623" viewBox="0 0 964 623" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="964" height="623" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="916" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Hunt bugs until the search goes dry</text><text x="46" y="77" font-size="13.5" fill="#475569">Repeatedly spawn finders that surface fresh bugs; keep looping while new ones appear and stop only after two</text><text x="46" y="96" font-size="13.5" fill="#475569">rounds in a row turn up nothing new.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — For unknown-size discovery, where a fixed pass count either stops early and misses the tail or burns</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">budget long after the well has run dry.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="916" height="349" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="148" x2="940" y2="148" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="279" x2="940" y2="279" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Each round runs finders across the codebase and dedupes their hits against everything already seen, so only genuinely new bugs count.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Find a round of bugs</text><text x="80" y="54" font-size="12.5" fill="#475569">Each round runs finders across the codebase and</text><text x="80" y="71" font-size="12.5" fill="#475569">dedupes their hits against everything already</text><text x="80" y="88" font-size="12.5" fill="#475569">seen, so only genuinely new bugs count.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 148)"><g class="lane-label"><title>Confirm each fresh bug actually reproduces, drop the false positives, and add what&#39;s left to the running ledger.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Verify and bank the survivors</text><text x="80" y="54" font-size="12.5" fill="#475569">Confirm each fresh bug actually reproduces,</text><text x="80" y="71" font-size="12.5" fill="#475569">drop the false positives, and add what&#39;s left</text><text x="80" y="88" font-size="12.5" fill="#475569">to the running ledger.</text><circle cx="84" cy="103" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 279)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Stop when the well runs dry</text><circle cx="84" cy="49" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="53" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(213 0)"><g class="edge"><path d="M 304 76 L 304 110" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,110 300.5,103 307.5,103" fill="#64748b"/></g><g class="edge"><path d="M 304 132 L 304 190" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,190 300.5,183 307.5,183" fill="#64748b"/></g><g class="edge"><path d="M 304 216 L 304 319" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,319 300.5,312 307.5,312" fill="#64748b"/></g><g class="agent-node"><title>Find bugs in the codebase.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="decision"><title>fresh.length === 0</title><polygon points="304,110 315,121 304,132 293,121" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><rect x="318" y="114.7" width="120.84" height="14" fill="#ffffff"/><text x="321" y="125" font-size="11" fill="#94a3b8" font-style="italic">fresh.length === 0</text></g><g class="agent-node"><circle cx="306" cy="205" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="203" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><rect x="322" y="195.5" width="129.25" height="15.5" fill="#ffffff"/><text x="325" y="207" font-size="12.5" fill="#334155">verify each fresh</text><text x="318" y="192" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="319" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="338" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g><g class="control-arc"><path d="M 297.95 125.95 C 276 121 276 63 289 63" fill="none" stroke="#e8694a" stroke-width="1.4"/><polygon points="289,63 282,66.5 282,59.5" fill="#e8694a"/><rect x="251.86" y="114.2" width="25.14" height="14" fill="#ffffff"/><text x="274" y="124.5" font-size="11" fill="#94a3b8" font-style="italic" text-anchor="end">yes</text></g><g class="loop-badge"><title>repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remaining() &gt; 50_000)</title><rect x="322" y="71.7" width="407.94" height="14" fill="#ffffff"/><text x="325" y="82" font-size="11" fill="#e8694a" font-weight="600">↻ repeat while dryRounds &lt; 2 &amp;&amp; (!budget.total || budget.remai…</text></g></g></g>
<g class="provenance"><text x="940" y="614" font-size="10.5" fill="#94a3b8" text-anchor="end">v0.1.0</text></g>
</svg>
