th="146.36" height="14" fill="#ffffff"/><text x="304" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:the handler code</text></g><g class="agent-node"><circle cx="454" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><rect x="390.39" y="100.7" width="127.22" height="14" fill="#ffffff"/><text x="454" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:the changelog</text></g><rect class="barrier" x="141" y="124.5" width="326" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="151" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>What&#39;s missing from this reference — endpoints, params, error cases, examples?\…</title><circle cx="304" cy="221.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><rect x="322" y="214" width="172.75" height="15.5" fill="#ffffff"/><text x="325" y="225.5" font-size="12.5" fill="#334155">critic: what&#39;s missing?</text></g><g class="decision"><title>audit.gaps.length === 0</title><polygon points="304,268.5 315,279.5 304,290.5 293,279.5" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><rect x="318" y="273.2" width="152.74" height="14" fill="#ffffff"/><text x="321" y="283.5" font-size="11" fill="#94a3b8" font-style="italic">audit.gaps.length === 0</text></g><g class="control-node"><title>break;</title><rect class="control-box" x="254" y="310.5" width="100" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="329.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">break loop</text></g><circle class="hub" cx="434" cy="364" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="306" cy="402.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="400.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><rect x="322" y="393" width="151" height="15.5" fill="#ffffff"/><text x="325" y="404.5" font-size="12.5" fill="#334155">fill each audit.gaps</tex