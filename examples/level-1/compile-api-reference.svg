 class="agent-node"><circle cx="304" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="304" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:the handler code</text></g><g class="agent-node"><circle cx="454" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="454" y="111" font-size="11" fill="#334155" text-anchor="middle">draft:the changelog</text></g><rect class="barrier" x="141" y="132.5" width="326" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="159" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>What&#39;s missing from this reference — endpoints, params, error cases, examples?\…</title><circle cx="304" cy="229.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="233.5" font-size="12.5" fill="#334155">critic: what&#39;s missing?</text></g><g class="decision"><title>audit.gaps.length === 0</title><polygon points="304,276.5 315,287.5 304,298.5 293,287.5" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="291.5" font-size="11" fill="#94a3b8" font-style="italic">audit.gaps.length === 0</text></g><g class="control-node"><title>break;</title><rect class="control-box" x="254" y="318.5" width="100" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="337.5" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">break loop</text></g><circle class="hub" cx="434" cy="372" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="306" cy="410.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><circle cx="304" cy="408.5" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="412.5" font-size="12.5" fill="#334155">fill each audit.gaps</text><text x="318" y="397.5" font-size="11" font-weight="700" fill="#e8694a">×N</text></g><g class="agent-node"><title>Assemble the final ordered reference from:\n${JSON.stringify(sections)}</title><circle 