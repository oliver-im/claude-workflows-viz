<svg xmlns="http://www.w3.org/2000/svg" width="920" height="816.5" viewBox="0 0 920 816.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="920" height="816.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="872" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Compile an API reference</text><text x="46" y="77" font-size="13.5" fill="#475569">Draft the reference from every source at once, then let a completeness critic name what&#39;s still missing —</text><text x="46" y="96" font-size="13.5" fill="#475569">endpoints, params, error cases — and fill those gaps round after round until the critic signs off.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When the cost of an incomplete reference is silent — a missing error code or undocumented param that</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">nobody notices until it breaks — so explicit gap-finding beats hoping the first pass was thorough.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="872" height="542.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="168.5" x2="896" y2="168.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="427.5" x2="896" y2="427.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Readers fan out across the docs, the handler code, and the changelog at once, each drafting the sections it can see so the first pass is broad, not deep.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Draft from every source</text><text x="80" y="54" font-size="12.5" fill="#475569">Readers fan out across the docs, the handler</text><text x="80" y="71" font-size="12.5" fill="#475569">code, and the changelog at once, each drafting</text><text x="80" y="88" font-size="12.5" fill="#475569">the sections it can see so the first pass is</text><text x="80" y="105" font-size="12.5" fill="#475569">broad, not deep.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 168.5)"><g class="lane-label"><title>A critic names what&#39;s missing — an undocumented param, an unlisted error, a stale example — and a writer fills each gap; repeat until the critic finds nothing left.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Critique and fill the gaps</text><text x="80" y="54" font-size="12.5" fill="#475569">A critic names what&#39;s missing — an undocumented</text><text x="80" y="71" font-size="12.5" fill="#475569">param, an unlisted error, a stale example — and</text><text x="80" y="88" font-size="12.5" fill="#475569">a writer fills each gap; repeat until the</text><text x="80" y="105" font-size="12.5" fill="#475569">critic finds nothing left.</text><circle cx="84" cy="120" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 427.5)"><g class="lane-label"><title>Stitch the drafted and back-filled sections into one ordered reference with a consistent voice and a working table of contents.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Assemble the reference</text><text x="80" y="54" font-size="12.5" fill="#475569">Stitch the drafted and back-filled sections</text><text x="80" y="71" font-size="12.5" fill="#475569">into one ordered reference with a consistent</text><text x="80" y="88" font-size="12.5" fill="#475569">voice and a working table of contents.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(381 0)"><g class="edge"><path d="M 304 57 L 154 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="154,73 160.59,68.78 161.33,75.74" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 304 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,73 300.5,66 307.5,66" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 454 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="454,73 446.67,75.74 447.41,68.78" fill="#64748b"/></g><g class="edge"><path d="M 154 99 L 154 124.5" fill="none" stroke="#64748b" stroke-width="1.1"/></g><g class="edge"