<svg xmlns="http://www.w3.org/2000/svg" width="760" height="698" viewBox="0 0 760 698" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="698" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a change with two lineages</text><text x="46" y="77" font-size="13.5" fill="#475569">Review the same diff with two independent reviewers — one Claude, one external — and</text><text x="46" y="96" font-size="13.5" fill="#475569">merge only what both lineages agree is real, killing single-model blind spots.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a risky change, when one model&#39;s blind spots are the failure</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">mode and a second, differently-trained reviewer is cheap insurance.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="712" height="424" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="139" x2="736" y2="139" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="309" x2="736" y2="309" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Compute the cumulative diff against the base branch and split it into focus targets the reviewers can attack independently.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Scope the diff</text><text x="80" y="54" font-size="12.5" fill="#475569">Compute the cumulative diff against the base</text><text x="80" y="71" font-size="12.5" fill="#475569">branch and split it into focus targets the</text><text x="80" y="88" font-size="12.5" fill="#475569">reviewers can attack independently.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 139)"><line x1="234" y1="12" x2="234" y2="146" stroke="#e2e8f0" stroke-width="1"/><g class="lane-label"><title>A Claude reviewer reads the diff for correctness, security, and convention drift, reporting each finding with file:line and a confidence.</title><circle cx="45" cy="25" r="9" fill="#334155"/><text x="45" y="28.4" font-size="10.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="62" y="29" font-size="13" fill="#0f172a" font-weight="700">Claude review</text><text x="62" y="47" font-size="11" fill="#475569">A Claude reviewer reads</text><text x="62" y="62" font-size="11" fill="#475569">the diff for correctness,</text><text x="62" y="77" font-size="11" fill="#475569">security, and convention</text><text x="62" y="92" font-size="11" fill="#475569">drift, reporting each</text><text x="62" y="107" font-size="11" fill="#475569">finding with file:line</text><text x="62" y="122" font-size="11" fill="#475569">and a confidence.</text><circle cx="66" cy="134" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><g><title>model: claude-opus-4-8</title><text x="77" y="138" font-size="10.5" fill="#64748b">opus</text></g></g><g class="lane-label"><title>A second, non-Claude reviewer audits the same diff from scratch — its different training surfaces issues the first lineage anchors past.</title><circle cx="255" cy="25" r="9" fill="#334155"/><text x="255" y="28.4" font-size="10.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="272" y="29" font-size="13" fill="#0f172a" font-weight="700">External review</text><text x="272" y="47" font-size="11" fill="#475569">A second, non-Claude</text><text x="272" y="62" font-size="11" fill="#475569">reviewer audits the same</text><text x="272" y="77" font-size="11" fill="#475569">diff from scratch — its</text><text x="272" y="92" font-size="11" fill="#475569">different training</text><text x="272" y="107" font-size="11" fill="#475569">surfaces issues the first</text><text x="272" y="122" font-size="11" fill="#475569">lineage anchors past.</text><circle cx="276" cy="134" r="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><g><title>model: gpt-5-codex</title><text x="287" y="138" font-size="10.5" fill="#64748b">gpt-5-codex</text></g></g></g><g transform="translate(0 309)"><g class="lane-label"><title>Keep findings both lineages raise, flag the disagreements for a human, and drop what neither can defend on a second pass.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Merge the verdicts</text><text x="80" y="54" font-size="12.5" fill="#475569">Keep findings both lineages raise, flag the</text><text x="80" y="71" font-size="12.5" fill="#475569">disagreements for a human, and drop what</text><text x="80" y="88" font-size="12.5" fill="#475569">neither can defend on a second pass.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(270 0)"><g class="edge"><path d="M 304 186 L 239 202" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="239,202 244.96,196.93 246.63,203.73" fill="#64748b"/></g><g class="edge"><path d="M 304 186 L 369 202" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="369,202 361.37,203.73 363.04,196.93" fill="#64748b"/></g><g class="edge"><path d="M 239 228 L 304 265" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,265 296.19,264.58 299.65,258.5" fill="#64748b"/></g><g class="edge"><path d="M 369 228 L 304 265" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,265 308.35,258.5 311.81,264.58" fill="#64748b"/></g><g class="edge"><path d="M 304 272 L 304 288" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,288 300.5,281 307.5,281" fill="#64748b"/></g><g class="edge"><path d="M 304 76 L 304 179" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,179 300.5,172 307.5,172" fill="#64748b"/></g><g class="edge"><path d="M 304 295 L 304 349" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,349 300.5,342 307.5,342" fill="#64748b"/></g><g class="agent-node"><title>Compute the diff vs main and split it into focus targets.</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><circle class="hub" cx="304" cy="182.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Review these targets for correctness, security, conventions:\n${JSON.stringify(…</title><circle cx="239" cy="215" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="239" y="240" font-size="11" fill="#334155" text-anchor="middle">review:claude</text></g><g class="agent-node"><title>Independently audit the same targets:\n${JSON.stringify(targets.targets)}</title><circle cx="369" cy="215" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="369" y="240" font-size="11" fill="#334155" text-anchor="middle">review:external</text></g><rect class="barrier" x="226" y="265" width="156" height="7" rx="3.5" fill="#e8694a"/><circle class="hub" cx="304" cy="291.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>Keep what both reviews agree on, flag the disagreements:\n${claudeFindings}\n--…</title><circle cx="304" cy="362" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g></g></g>
