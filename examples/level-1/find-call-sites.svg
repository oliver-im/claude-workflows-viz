<svg xmlns="http://www.w3.org/2000/svg" width="1057" height="728.5" viewBox="0 0 1057 728.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1057" height="728.5" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1009" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Find every call site of a deprecated API</text><text x="46" y="77" font-size="13.5" fill="#475569">Sweep the repo four different ways at once — each search blind to the others — then merge the hits and drop the same site</text><text x="46" y="96" font-size="13.5" fill="#475569">found two ways, so no call site slips through one method&#39;s blind spot.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before removing a widely-used API, when any single search (plain grep, the type checker, the test suite) reliably</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">misses a class of call sites the others catch.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1009" height="454.5" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="176.5" x2="1033" y2="176.5" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="322.5" x2="1033" y2="322.5" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>Four searchers run concurrently — by name, by call graph, by test references, by dynamic dispatch — each blind to the rest so no one method&#39;s blind spot decides coverage.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Sweep every way at once</text><text x="80" y="54" font-size="12.5" fill="#475569">Four searchers run concurrently — by name, by</text><text x="80" y="71" font-size="12.5" fill="#475569">call graph, by test references, by dynamic</text><text x="80" y="88" font-size="12.5" fill="#475569">dispatch — each blind to the rest so no one</text><text x="80" y="105" font-size="12.5" fill="#475569">method&#39;s blind spot decides coverage.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 176.5)"><g class="lane-label"><title>Union every searcher&#39;s hits and collapse the same call site surfaced two different ways into one, so a site found by both grep and the type checker counts once.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Merge and dedupe the hits</text><text x="80" y="54" font-size="12.5" fill="#475569">Union every searcher&#39;s hits and collapse the</text><text x="80" y="71" font-size="12.5" fill="#475569">same call site surfaced two different ways into</text><text x="80" y="88" font-size="12.5" fill="#475569">one, so a site found by both grep and the type</text><text x="80" y="105" font-size="12.5" fill="#475569">checker counts once.</text><circle cx="84" cy="120" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 322.5)"><g class="lane-label"><title>Turn the distinct call sites into an ordered checklist — file:line, the calling context, and the safe replacement — that a follow-up pass can work through.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Write the migration checklist</text><text x="80" y="54" font-size="12.5" fill="#475569">Turn the distinct call sites into an ordered</text><text x="80" y="71" font-size="12.5" fill="#475569">checklist — file:line, the calling context, and</text><text x="80" y="88" font-size="12.5" fill="#475569">the safe replacement — that a follow-up pass</text><text x="80" y="105" font-size="12.5" fill="#475569">can work through.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(430 0)"><g class="edge"><path d="M 304 57 L 79 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="79,73 85.73,69.01 86.23,75.99" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 229 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="229,73 235.12,68.12 236.58,74.96" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 379 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="379,73 371.42,74