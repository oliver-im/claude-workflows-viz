<svg xmlns="http://www.w3.org/2000/svg" width="898" height="720" viewBox="0 0 898 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="898" height="720" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="850" height="183" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Localize the release notes</text><text x="46" y="77" font-size="13.5" fill="#475569">Map each target locale through its own translate-then-proofread pipeline — no barrier between the</text><text x="46" y="96" font-size="13.5" fill="#475569">stages, so a fast locale ships while a slow one is still translating — then reduce the finished files</text><text x="46" y="115" font-size="13.5" fill="#475569">into one pull request.</text><text x="46" y="144" font-size="12.5" fill="#64748b" font-style="italic">When to use — For per-item work that fans wide and stages deep — translation, codemods, asset processing —</text><text x="46" y="161" font-size="12.5" fill="#64748b" font-style="italic">where the slowest single item, not the slowest stage, should set the wall-clock.</text></g></g>
<g transform="translate(0 223)"><rect x="24" y="12" width="850" height="427" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="144" x2="874" y2="144" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="295" x2="874" y2="295" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>One translator per locale drafts the notes and writes its file in its own worktree, so the parallel writes never collide on disk.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Translate each locale</text><text x="80" y="54" font-size="12.5" fill="#475569">One translator per locale drafts the notes and</text><text x="80" y="71" font-size="12.5" fill="#475569">writes its file in its own worktree, so the</text><text x="80" y="88" font-size="12.5" fill="#475569">parallel writes never collide on disk.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 144)"><g class="lane-label"><title>Back-translate to catch drift and lint each file as it lands; with no barrier between stages, a finished locale advances here while others are still translating.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Proofread each translation</text><text x="80" y="54" font-size="12.5" fill="#475569">Back-translate to catch drift and lint each</text><text x="80" y="71" font-size="12.5" fill="#475569">file as it lands; with no barrier between</text><text x="80" y="88" font-size="12.5" fill="#475569">stages, a finished locale advances here while</text><text x="80" y="105" font-size="12.5" fill="#475569">others are still translating.</text><circle cx="84" cy="120" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 295)"><g class="lane-label"><title>Once every locale&#39;s file lands, a shared open-a-PR sub-workflow collates them into a single pull request with a per-locale summary of what changed.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Reduce into one PR</text><text x="80" y="54" font-size="12.5" fill="#475569">Once every locale&#39;s file lands, a shared</text><text x="80" y="71" font-size="12.5" fill="#475569">open-a-PR sub-workflow collates them into a</text><text x="80" y="88" font-size="12.5" fill="#475569">single pull request with a per-locale summary</text><text x="80" y="105" font-size="12.5" fill="#475569">of what changed.</text><circle cx="84" cy="120" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="124" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(367 0)"><g class="edge"><path d="M 139.45 99 L 139.45 189" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="139.45,189 135.95,182 142.95,182" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 139.45 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="139.45,73 146.08,68.84 146.76,75.81" fill="#64748b"/></g><g class="edge"><path d="M 249.15 99 L 249.15 189" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="249.15,189 245.65,182 252.65,182" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 249.15 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="249.15,73 254.89,67.68 256.85,74.4" fill="#64748b"/></g><g class="edge"><path d="M 358.85 99 L 358.85 189" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="358.85,189 355.35,182 362.35,182" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 358.85 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="358.85,73 351.15,74.4 353.11,67.68" fill="#64748b"/></g><g class="edge"><path d="M 468.55 99 L 468.55 189" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="468.55,189 465.05,182 472.05,182" fill="#64748b"/></g><g class="edge"><path d="M 304 57 L 468.55 73" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="468.55,73 461.24,75.81 461.92,68.84" fill="#64748b"/></g><g class="edge"><path d="M 139.45 215 L 304 252" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,252 296.4,253.88 297.94,247.05" fill="#64748b"/></g><g class="edge"><path d="M 249.15 215 L 304 252" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,252 296.24,250.99 300.15,245.18" fill="#64748b"/></g><g class="edge"><path d="M 358.85 215 L 304 252" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,252 307.85,245.18 311.76,250.99" fill="#64748b"/></g><g class="edge"><path d="M 468.55 215 L 304 252" fill="none" stroke="#64748b" stroke-width="1.1"/><polygon points="304,252 310.06,247.05 311.6,253.88" fill="#64748b"/></g><g class="edge"><path d="M 304 259 L 304 335" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,335 300.5,328 307.5,328" fill="#64748b"/></g><circle class="hub" cx="304" cy="53.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="139.45" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="139.45" y="111" font-size="11" fill="#334155" text-anchor="middle">translate:de</text></g><g class="agent-node"><circle cx="139.45" cy="202" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="139.45" y="227" font-size="11" fill="#334155" text-anchor="middle">proofread</text></g><g class="agent-node"><circle cx="249.15" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="249.15" y="111" font-size="11" fill="#334155" text-anchor="middle">translate:ja</text></g><g class="agent-node"><circle cx="249.15" cy="202" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="249.15" y="227" font-size="11" fill="#334155" text-anchor="middle">proofread</text></g><g class="agent-node"><circle cx="358.85" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="358.85" y="111" font-size="11" fill="#334155" text-anchor="middle">translate:pt-BR</text></g><g class="agent-node"><circle cx="358.85" cy="202" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="358.85" y="227" font-size="11" fill="#334155" text-anchor="middle">proofread</text></g><g class="agent-node"><circle cx="468.55" cy="86" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="468.55" y="111" font-size="11" fill="#334155" text-anchor="middle">translate:fr</text></g><g class="agent-node"><circle cx="468.55" cy="202" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="468.55" y="227" font-size="11" fill="#334155" text-anchor="middle">proofread</text></g><circle class="hub" cx="304" cy="255.5" r="3.5" fill="#94a3b8"/><g class="task-node"><rect x="222" y="335" width="164" height="30" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/><text x="304" y="354" font-size="12" fill="#334155" text-anchor="middle">open-localization-pr</text></g></g></g>
