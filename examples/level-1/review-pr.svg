<svg xmlns="http://www.w3.org/2000/svg" width="865" height="796" viewBox="0 0 865 796" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="865" height="796" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="817" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Review a pull request</text><text x="46" y="77" font-size="13.5" fill="#475569">Review a branch&#39;s diff across independent dimensions, adversarially verify each finding, then</text><text x="46" y="96" font-size="13.5" fill="#475569">synthesize a ranked report.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — Before merging a sizable or unfamiliar PR, when a single reviewer pass risks missing</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">correctness, security, or performance regressions.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="817" height="522" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="139" x2="841" y2="139" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="273" x2="841" y2="273" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="407" x2="841" y2="407" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><title>List changed files against the base branch and group them by subsystem so each reviewer gets a focused slice.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Map the diff</text><text x="80" y="54" font-size="12.5" fill="#475569">List changed files against the base branch and</text><text x="80" y="71" font-size="12.5" fill="#475569">group them by subsystem so each reviewer gets a</text><text x="80" y="88" font-size="12.5" fill="#475569">focused slice.</text><circle cx="84" cy="103" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 139)"><g class="lane-label"><title>One agent per dimension — correctness, security, performance — reviews its slice and reports findings with file:line.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Review by dimension</text><text x="80" y="54" font-size="12.5" fill="#475569">One agent per dimension — correctness,</text><text x="80" y="71" font-size="12.5" fill="#475569">security, performance — reviews its slice and</text><text x="80" y="88" font-size="12.5" fill="#475569">reports findings with file:line.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 273)"><g class="lane-label"><title>Spawn a panel of skeptics per finding, each prompted to refute it; drop anything the panel cannot defend.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Adversarially verify</text><text x="80" y="54" font-size="12.5" fill="#475569">Spawn a panel of skeptics per finding, each</text><text x="80" y="71" font-size="12.5" fill="#475569">prompted to refute it; drop anything the panel</text><text x="80" y="88" font-size="12.5" fill="#475569">cannot defend.</text><circle cx="84" cy="103" r="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: claude-opus-4-8</text></g></g><g transform="translate(0 407)"><g class="lane-label"><title>Dedupe the survivors, rank them by severity, and write the review with reproducible citations.</title><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Synthesize the report</text><text x="80" y="54" font-size="12.5" fill="#475569">Dedupe the survivors, rank them by severity,</text><text x="80" y="71" font-size="12.5" fill="#475569">and write the review with reproducible</text><text x="80" y="88" font-size="12.5" fill="#475569">citations.</text><circle cx="84" cy="103" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="107" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g class="topology" transform="translate(350 0)"><g class="edge"><path d="M 175.16 228 L 175.16 