<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="921" viewBox="0 0 1122 921" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="921" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Triage an incoming issue</text><text x="46" y="77" font-size="13.5" fill="#475569">Classify a new bug report by subsystem, then route it to the one matching specialist to draft a fix — three of the four branches</text><text x="46" y="96" font-size="13.5" fill="#475569">never run.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When reports arrive faster than one engineer can read them and almost every issue belongs to a small, predictable set of</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">subsystems.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="669" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="190" x2="1098" y2="190" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="355" x2="1098" y2="355" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="520" x2="1098" y2="520" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Classify the report</text><text x="80" y="54" font-size="12.5" fill="#475569">Read the title and body and</text><text x="80" y="71" font-size="12.5" fill="#475569">label the issue as frontend,</text><text x="80" y="88" font-size="12.5" fill="#475569">backend, infra, or docs,</text><text x="80" y="105" font-size="12.5" fill="#475569">picking the single best-fit</text><text x="80" y="122" font-size="12.5" fill="#475569">owner with a confidence</text><text x="80" y="139" font-size="12.5" fill="#475569">score.</text><circle cx="84" cy="154" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="158" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g transform="translate(0 190)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Route to a specialist</text><text x="80" y="54" font-size="12.5" fill="#475569">Dispatch only to the matching</text><text x="80" y="71" font-size="12.5" fill="#475569">agent — frontend &amp; backend,</text><text x="80" y="88" font-size="12.5" fill="#475569">infra, or docs — so the three</text><text x="80" y="105" font-size="12.5" fill="#475569">branches that don&#39;t apply are</text><text x="80" y="122" font-size="12.5" fill="#475569">never spawned.</text><circle cx="84" cy="137" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 355)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Draft a fix</text><text x="80" y="54" font-size="12.5" fill="#475569">The chosen specialist</text><text x="80" y="71" font-size="12.5" fill="#475569">reproduces the bug, isolates</text><text x="80" y="88" font-size="12.5" fill="#475569">the root cause, and writes a</text><text x="80" y="105" font-size="12.5" fill="#475569">step-by-step plan naming the</text><text x="80" y="122" font-size="12.5" fill="#475569">files to change.</text><circle cx="84" cy="137" r="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: sonnet</text></g></g><g transform="translate(0 520)"><g class="lane-label"><circle cx="57" cy="29" r="11" fill="#334155"/><text x="57" y="32.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="80" y="34" font-size="15" fill="#0f172a" font-weight="700">Reply or escalate</text><text x="80" y="54" font-size="12.5" fill="#475569">Post the plan back on the</text><text x="80" y="71" font-size="12.5" fill="#475569">issue with a severity label</text><text x="80" y="88" font-size="12.5" fill="#475569">and an owner, or escalate to</text><text x="80" y="105" font-size="12.5" fill="#475569">a human when the classifier&#39;s</text><text x="80" y="122" font-size="12.5" fill="#475569">confidence was low.</text><circle cx="84" cy="137" r="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="95" y="141" font-size="11.5" fill="#64748b">model: haiku</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 252 L 434 272" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,272 426.55,274.39 427.61,267.48" fill="#64748b"/><text x="374" y="262" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 252 L 304 397" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,397 300.5,390 307.5,390" fill="#64748b"/><text x="309" y="324.5" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 230" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,230 300.5,223 307.5,223" fill="#64748b"/></g><g class="edge"><path d="M 434 279 L 304 560" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,560 303.76,552.18 310.12,555.12" fill="#64748b"/></g><g class="edge"><path d="M 304 423 L 304 560" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,560 300.5,553 307.5,553" fill="#64748b"/></g><g class="agent-node"><title>Classify this issue into one of ${SPECIALISTS.join(&quot;, &quot;)}:\n${args.issueBody}</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="decision"><title>confidence &lt; 0.5</title><polygon points="304,230 315,241 304,252 293,241" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="245" font-size="11" fill="#94a3b8" font-style="italic">confidence &lt; 0.5</text></g><circle class="hub" cx="434" cy="275.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>As the ${area} specialist, draft a fix plan for:\n${args.issueBody}</title><circle cx="304" cy="410" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="414" font-size="12.5" fill="#334155">fix:${area}</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="560" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="579" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
</svg>
