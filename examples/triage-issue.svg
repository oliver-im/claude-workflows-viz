<svg xmlns="http://www.w3.org/2000/svg" width="760" height="587" viewBox="0 0 760 587" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="587" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Triage an incoming issue</text><text x="46" y="77" font-size="13.5" fill="#475569">Classify a new bug report by subsystem, then route it to the one matching specialist</text><text x="46" y="96" font-size="13.5" fill="#475569">to draft a fix — three of the four branches never run.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When reports arrive faster than one engineer can read them and almost every</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">issue belongs to a small, predictable set of subsystems.</text></g></g>
<g class="topology" transform="translate(0 204)"><rect class="swimlane" x="24" y="12" width="712" height="76" rx="10" fill="#dbeafe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="92" width="712" height="99" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="199" width="712" height="76" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane-empty" x="24" y="317" width="712" height="30" rx="10" fill="#eef2f7" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4 3"/><g class="edge"><path d="M 304 152 L 434 172" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,172 426.55,174.39 427.61,167.48" fill="#64748b"/><text x="374" y="162" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 152 L 304 237" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,237 300.5,230 307.5,230" fill="#64748b"/><text x="309" y="194.5" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 130" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,130 300.5,123 307.5,123" fill="#64748b"/></g><g class="agent-node"><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="67" font-size="12.5" fill="#334155">Classify this issue into one of…</text></g><g class="decision"><title>confidence &lt; 0.5</title><polygon points="304,130 315,141 304,152 293,141" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="145" font-size="11" fill="#94a3b8" font-style="italic">confidence &lt; 0.5</text></g><circle class="hub" cx="434" cy="175.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><circle cx="304" cy="250" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="254" font-size="12.5" fill="#334155">fix:${area}</text></g><g class="lane-chrome"><circle cx="49" cy="37" r="11" fill="#334155"/><text x="49" y="40.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="72" y="41" font-size="15" fill="#0f172a" font-weight="700">Classify the report</text><rect x="668" y="27" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="695" y="41" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text></g><g class="lane-chrome"><circle cx="49" cy="117" r="11" fill="#334155"/><text x="49" y="120.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="72" y="121" font-size="15" fill="#0f172a" font-weight="700">Route to a specialist</text><rect x="661" y="107" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="121" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="224" r="11" fill="#334155"/><text x="49" y="227.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="72" y="228" font-size="15" fill="#0f172a" font-weight="700">Draft a fix</text><rect x="661" y="214" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="691.5" y="228" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text></g><g class="lane-chrome"><circle cx="49" cy="332" r="11" fill="#334155"/><text x="49" y="335.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="72" y="336.5" font-size="14" fill="#0f172a" font-weight="600">Reply or escalate</text><text x="722" y="336.5" font-size="11" fill="#94a3b8" font-style="italic" text-anchor="end">control only</text></g></g>
</svg>
