<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="772" viewBox="0 0 1122 772" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="772" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Triage an incoming issue</text><text x="46" y="77" font-size="13.5" fill="#475569">Classify a new bug report by subsystem, then route it to the one matching specialist to draft a fix — three of the four branches</text><text x="46" y="96" font-size="13.5" fill="#475569">never run.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When reports arrive faster than one engineer can read them and almost every issue belongs to a small, predictable set of</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">subsystems.</text></g></g>
<g transform="translate(0 204)"><rect class="swimlane" x="24" y="12" width="1074" height="128" rx="10" fill="#dbeafe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="140" width="1074" height="132" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="272" width="1074" height="132" rx="10" fill="#dcfce7" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><rect class="swimlane" x="24" y="404" width="1074" height="128" rx="10" fill="#dbeafe" fill-opacity="0.55" stroke="#e8edf3" stroke-width="1"/><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Classify the report</text><rect x="74" y="40" width="51" height="19" rx="9" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="99.5" y="53" font-size="11" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="74" y="76" font-size="12.5" fill="#475569">Read the title and body and</text><text x="74" y="93" font-size="12.5" fill="#475569">label the issue as frontend,</text><text x="74" y="110" font-size="12.5" fill="#475569">backend, infra, or docs, pick…</text></g></g><g transform="translate(0 140)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Route to a specialist</text><rect x="74" y="40" width="57" height="19" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="102.5" y="53" font-size="11" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="74" y="76" font-size="12.5" fill="#475569">Dispatch only to the matching</text><text x="74" y="93" font-size="12.5" fill="#475569">agent — frontend &amp; backend,</text><text x="74" y="110" font-size="12.5" fill="#475569">infra, or docs — so the three…</text></g></g><g transform="translate(0 272)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Draft a fix</text><rect x="74" y="40" width="57" height="19" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="102.5" y="53" font-size="11" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="74" y="76" font-size="12.5" fill="#475569">The chosen specialist</text><text x="74" y="93" font-size="12.5" fill="#475569">reproduces the bug, isolates</text><text x="74" y="110" font-size="12.5" fill="#475569">the root cause, and writes a…</text></g></g><g transform="translate(0 404)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Reply or escalate</text><rect x="74" y="40" width="51" height="19" rx="9" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="99.5" y="53" font-size="11" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="74" y="76" font-size="12.5" fill="#475569">Post the plan back on the</text><text x="74" y="93" font-size="12.5" fill="#475569">issue with a severity label</text><text x="74" y="110" font-size="12.5" fill="#475569">and an owner, or escalate to…</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 202 L 434 222" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,222 426.55,224.39 427.61,217.48" fill="#64748b"/><text x="374" y="212" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 202 L 304 314" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,314 300.5,307 307.5,307" fill="#64748b"/><text x="309" y="258" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 180" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,180 300.5,173 307.5,173" fill="#64748b"/></g><g class="edge"><path d="M 434 229 L 304 444" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,444 304.63,436.2 310.62,439.82" fill="#64748b"/></g><g class="edge"><path d="M 304 340 L 304 444" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,444 300.5,437 307.5,437" fill="#64748b"/></g><g class="agent-node"><title>Classify this issue into one of ${SPECIALISTS.join(&quot;, &quot;)}:\n${args.issueBody}</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="67" font-size="12.5" fill="#334155">Classify this issue into one of…</text></g><g class="decision"><title>confidence &lt; 0.5</title><polygon points="304,180 315,191 304,202 293,191" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="195" font-size="11" fill="#94a3b8" font-style="italic">confidence &lt; 0.5</text></g><circle class="hub" cx="434" cy="225.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>As the ${area} specialist, draft a fix plan for:\n${args.issueBody}</title><circle cx="304" cy="327" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="331" font-size="12.5" fill="#334155">fix:${area}</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="444" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="463" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
</svg>
