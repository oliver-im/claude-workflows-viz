<svg xmlns="http://www.w3.org/2000/svg" width="760" height="774" viewBox="0 0 760 774" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="760" height="774" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="712" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Triage an incoming issue</text><text x="46" y="77" font-size="13.5" fill="#475569">Classify a new bug report by subsystem, then route it to the one matching specialist</text><text x="46" y="96" font-size="13.5" fill="#475569">to draft a fix — three of the four branches never run.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When reports arrive faster than one engineer can read them and almost every</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">issue belongs to a small, predictable set of subsystems.</text></g></g>
<g transform="translate(0 204)"><g class="graph-band"><title>Read the title and body and label the issue as frontend, backend, infra, or docs, picking the single best-fit owner with a confidence score.</title><rect x="24" y="0" width="712" height="149" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Classify the report</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="42" y="54" font-size="11.5" fill="#64748b">Read the title and body and label the issue as frontend, backend, infra, or docs, picking the single…</text><g class="agent-node"><title>Classify this issue into one of…</title><circle cx="86" cy="90" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="86" y="113" font-size="10.5" fill="#334155" text-anchor="middle">Classify this</text><text x="86" y="125" font-size="10.5" fill="#334155" text-anchor="middle">issue into on…</text></g></g></g>
<g transform="translate(0 369)"><g class="graph-band"><title>Dispatch only to the matching agent — frontend &amp; backend, infra, or docs — so the three branches that don&#39;t apply are never spawned.</title><rect x="24" y="0" width="712" height="121" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Route to a specialist</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="42" y="54" font-size="11.5" fill="#64748b">Dispatch only to the matching agent — frontend &amp; backend, infra, or docs — so the three branches tha…</text><g class="decision"><polygon points="56,76 70,90 56,104 42,90" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="76" y="83" font-size="10.5" fill="#334155">confidence &lt; 0.5</text></g></g></g>
<g transform="translate(0 513)"><g class="graph-band"><title>The chosen specialist reproduces the bug, isolates the root cause, and writes a step-by-step plan naming the files to change.</title><rect x="24" y="0" width="712" height="137" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Draft a fix</text><rect x="657" y="17" width="61" height="20" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="687.5" y="31" font-size="11.5" fill="#14532d" font-weight="600" text-anchor="middle">sonnet</text><text x="42" y="54" font-size="11.5" fill="#64748b">The chosen specialist reproduces the bug, isolates the root cause, and writes a step-by-step plan na…</text><g class="agent-node"><circle cx="75.5" cy="90" r="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="75.5" y="113" font-size="10.5" fill="#334155" text-anchor="middle">fix:${area}</text></g></g></g>
<g transform="translate(0 666)"><g class="phase-card"><rect x="24" y="0" width="712" height="84" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><circle cx="55" cy="29" r="13" fill="#334155"/><text x="55" y="33" font-size="12.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="82" y="32" font-size="16" fill="#0f172a" font-weight="700">Reply or escalate</text><rect x="664" y="17" width="54" height="20" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/><text x="691" y="31" font-size="11.5" fill="#1e3a5f" font-weight="600" text-anchor="middle">haiku</text><text x="82" y="50" font-size="13" fill="#475569">Post the plan back on the issue with a severity label and an owner, or escalate to a</text><text x="82" y="68" font-size="13" fill="#475569">human when the classifier&#39;s confidence was low.</text></g></g>
<g class="xband-overlay"><g class="xband-edge"><path d="M 56 473 L 56 491.75 A 9.75 9.75 0 0 0 65.75 501.5 L 65.75 501.5 A 9.75 9.75 0 0 1 75.5 511.25 L 75.5 591" fill="none" stroke="#475569" stroke-width="1.3"/><g class="arrowhead"><polygon points="75.5,591 72,584 79,584" fill="#475569"/></g><text x="51" y="484" font-size="9.5" fill="#94a3b8" text-anchor="end">no</text></g></g>
</svg>
