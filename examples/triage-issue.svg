<svg xmlns="http://www.w3.org/2000/svg" width="1122" height="868" viewBox="0 0 1122 868" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="1122" height="868" fill="#f8fafc"/>
<g transform="translate(0 24)"><g class="header-card"><rect x="24" y="0" width="1074" height="164" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><text x="46" y="48" font-size="22" fill="#0f172a" font-weight="700">Triage an incoming issue</text><text x="46" y="77" font-size="13.5" fill="#475569">Classify a new bug report by subsystem, then route it to the one matching specialist to draft a fix — three of the four branches</text><text x="46" y="96" font-size="13.5" fill="#475569">never run.</text><text x="46" y="125" font-size="12.5" fill="#64748b" font-style="italic">When to use — When reports arrive faster than one engineer can read them and almost every issue belongs to a small, predictable set of</text><text x="46" y="142" font-size="12.5" fill="#64748b" font-style="italic">subsystems.</text></g></g>
<g transform="translate(0 204)"><rect x="24" y="12" width="1074" height="616" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><g class="swimlane"></g><g class="swimlane"><line x1="24" y1="164" x2="1098" y2="164" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="320" x2="1098" y2="320" stroke="#e2e8f0" stroke-width="1"/></g><g class="swimlane"><line x1="24" y1="476" x2="1098" y2="476" stroke="#e2e8f0" stroke-width="1"/></g><g transform="translate(0 12)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">1</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Classify the report</text><text x="74" y="48" font-size="12.5" fill="#475569">Read the title and body and</text><text x="74" y="65" font-size="12.5" fill="#475569">label the issue as frontend,</text><text x="74" y="82" font-size="12.5" fill="#475569">backend, infra, or docs,</text><text x="74" y="99" font-size="12.5" fill="#475569">picking the single best-fit</text><text x="74" y="116" font-size="12.5" fill="#475569">owner with a confidence score.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g transform="translate(0 164)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">2</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Route to a specialist</text><text x="74" y="48" font-size="12.5" fill="#475569">Dispatch only to the matching</text><text x="74" y="65" font-size="12.5" fill="#475569">agent — frontend &amp; backend,</text><text x="74" y="82" font-size="12.5" fill="#475569">infra, or docs — so the three</text><text x="74" y="99" font-size="12.5" fill="#475569">branches that don&#39;t apply are</text><text x="74" y="116" font-size="12.5" fill="#475569">never spawned.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 320)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">3</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Draft a fix</text><text x="74" y="48" font-size="12.5" fill="#475569">The chosen specialist</text><text x="74" y="65" font-size="12.5" fill="#475569">reproduces the bug, isolates</text><text x="74" y="82" font-size="12.5" fill="#475569">the root cause, and writes a</text><text x="74" y="99" font-size="12.5" fill="#475569">step-by-step plan naming the</text><text x="74" y="116" font-size="12.5" fill="#475569">files to change.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: sonnet</text></g></g><g transform="translate(0 476)"><g class="lane-label"><circle cx="51" cy="27" r="11" fill="#334155"/><text x="51" y="30.7" font-size="11.5" fill="#ffffff" font-weight="700" text-anchor="middle">4</text><text x="74" y="31" font-size="15" fill="#0f172a" font-weight="700">Reply or escalate</text><text x="74" y="48" font-size="12.5" fill="#475569">Post the plan back on the</text><text x="74" y="65" font-size="12.5" fill="#475569">issue with a severity label</text><text x="74" y="82" font-size="12.5" fill="#475569">and an owner, or escalate to a</text><text x="74" y="99" font-size="12.5" fill="#475569">human when the classifier&#39;s</text><text x="74" y="116" font-size="12.5" fill="#475569">confidence was low.</text><text x="74" y="134" font-size="11.5" fill="#94a3b8" font-style="italic">model: haiku</text></g></g><g class="topology" transform="translate(338 0)"><g class="edge"><path d="M 304 226 L 434 246" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="434,246 426.55,248.39 427.61,241.48" fill="#64748b"/><text x="374" y="236" font-size="10.5" fill="#94a3b8">yes</text></g><g class="edge"><path d="M 304 226 L 304 362" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,362 300.5,355 307.5,355" fill="#64748b"/><text x="309" y="294" font-size="10.5" fill="#94a3b8">no</text></g><g class="edge"><path d="M 304 76 L 304 204" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,204 300.5,197 307.5,197" fill="#64748b"/></g><g class="edge"><path d="M 434 253 L 304 516" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,516 303.96,508.17 310.24,511.28" fill="#64748b"/></g><g class="edge"><path d="M 304 388 L 304 516" fill="none" stroke="#64748b" stroke-width="1.3"/><polygon points="304,516 300.5,509 307.5,509" fill="#64748b"/></g><g class="agent-node"><title>Classify this issue into one of ${SPECIALISTS.join(&quot;, &quot;)}:\n${args.issueBody}</title><circle cx="304" cy="63" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/></g><g class="decision"><title>confidence &lt; 0.5</title><polygon points="304,204 315,215 304,226 293,215" fill="#ffffff" stroke="#e8694a" stroke-width="1.4"/><text x="321" y="219" font-size="11" fill="#94a3b8" font-style="italic">confidence &lt; 0.5</text></g><circle class="hub" cx="434" cy="249.5" r="3.5" fill="#94a3b8"/><g class="agent-node"><title>As the ${area} specialist, draft a fix plan for:\n${args.issueBody}</title><circle cx="304" cy="375" r="13" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.25"/><text x="325" y="379" font-size="12.5" fill="#334155">fix:${area}</text></g><g class="control-node"><title>No agent/workflow calls were recovered in this phase.</title><rect class="control-box" x="256" y="516" width="96" height="30" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3"/><text x="304" y="535" font-size="12" fill="#9a3412" font-weight="600" text-anchor="middle">end</text></g></g></g>
</svg>
